<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 580" preserveAspectRatio="xMidYMid slice" width="1440" height="580" role="img" aria-label="Luxury contact atelier with sealed message, phone and premium hair signature">
