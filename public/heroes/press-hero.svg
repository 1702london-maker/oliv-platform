<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 480" preserveAspectRatio="xMidYMid slice" width="1440" height="480">
  <defs>
    <!-- Very dark editorial base - high contrast -->
    <linearGradient id="baseBg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#0A0705"/>
      <stop offset="60%" stop-color="#1C1108"/>
      <stop offset="100%" stop-color="#0A0705"/>
    </linearGradient>
    <!-- Dramatic side-lighting (left strong, right dark) -->
    <radialGradient id="sideLight" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6B4010" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#3A2208" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0705" stop-opacity="0"/>
    </radialGradient>
    <!-- Spotlight centre -->
    <radialGradient id="spotLight" cx="50%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#8A5520" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0A0705" stop-opacity="0"/>
    </radialGradient>
    <!-- Dark vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="40%" stop-color="#0A0705" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050302" stop-opacity="0.92"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1440" height="480" fill="url(#baseBg)"/>
  <rect width="1440" height="480" fill="url(#sideLight)"/>
  <rect width="1440" height="480" fill="url(#spotLight)"/>

  <!-- Blurred background subject silhouette — editorial model look -->
  <!-- Head/neck oval -->
  <ellipse cx="920" cy="160" rx="80" ry="95" fill="#5A380C" opacity="0.22"/>
  <!-- Shoulder spread -->
  <ellipse cx="950" cy="340" rx="200" ry="120" fill="#3A2208" opacity="0.28"/>
  <!-- Body column -->
  <rect x="840" y="200" width="200" height="260" rx="60" fill="#3A2208" opacity="0.18"/>

  <!-- Hair strands flowing from figure (right side) -->
  <g opacity="0.15" filter="url(#glow)" stroke="#C9A96E" stroke-width="1.2" fill="none">
    <path d="M 860 0 Q 880 100 870 200 Q 865 300 890 480"/>
    <path d="M 900 0 Q 930 120 915 240 Q 905 360 935 480"/>
    <path d="M 940 0 Q 970 140 960 270 Q 950 390 980 480"/>
    <path d="M 980 0 Q 1010 100 995 210 Q 985 330 1010 480"/>
    <path d="M 1020 0 Q 1050 90 1035 190 Q 1025 310 1055 480"/>
    <path d="M 1060 0 Q 1090 80 1075 180 Q 1065 300 1090 480"/>
    <path d="M 1100 0 Q 1120 70 1110 170 Q 1100 280 1130 480"/>
    <path d="M 1140 0 Q 1160 80 1145 180 Q 1135 290 1170 480"/>
  </g>

  <!-- Thin gold accent line (editorial style) -->
  <line x1="0" y1="3" x2="1440" y2="3" stroke="#C9A96E" stroke-width="1.5" opacity="0.35"/>
  <line x1="0" y1="477" x2="1440" y2="477" stroke="#C9A96E" stroke-width="1.5" opacity="0.35"/>

  <!-- Vignette -->
  <rect width="1440" height="480" fill="url(#vignette)"/>

  <!-- Text-side overlay for readability (centre-focused) -->
  <linearGradient id="textOverlay" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#0A0705" stop-opacity="0.7"/>
    <stop offset="30%" stop-color="#0A0705" stop-opacity="0.5"/>
    <stop offset="55%" stop-color="#0A0705" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#0A0705" stop-opacity="0.1"/>
  </linearGradient>
  <rect width="720" height="480" fill="url(#textOverlay)"/>
</svg>
