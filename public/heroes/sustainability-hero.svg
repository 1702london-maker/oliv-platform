<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 480" preserveAspectRatio="xMidYMid slice" width="1440" height="480">
  <defs>
    <!-- Slightly warmer, earthy base — sustainability theme -->
    <linearGradient id="baseBg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0F1008"/>
      <stop offset="45%" stop-color="#1C1C0A"/>
      <stop offset="100%" stop-color="#0A0B05"/>
    </linearGradient>
    <!-- Warm green-amber centre glow -->
    <radialGradient id="earthGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#4A5010" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#2A2C08" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0F1008" stop-opacity="0"/>
    </radialGradient>
    <!-- Golden highlight from above -->
    <radialGradient id="sunlight" cx="50%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#7A6018" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0F1008" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="68%">
      <stop offset="40%" stop-color="#0F1008" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050603" stop-opacity="0.92"/>
    </radialGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B8A050" stop-opacity="0"/>
      <stop offset="40%" stop-color="#B8A050" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#B8A050" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#B8A050" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="480" fill="url(#baseBg)"/>
  <rect width="1440" height="480" fill="url(#sunlight)"/>
  <rect width="1440" height="480" fill="url(#earthGlow)"/>

  <!-- Organic branch/leaf suggestion (abstract) -->
  <g opacity="0.1" stroke="#B8A050" stroke-width="1.5" fill="none">
    <!-- Main branch -->
    <path d="M 1100 480 Q 1080 360 1050 280 Q 1020 200 980 140 Q 950 80 920 0"/>
    <!-- Sub branches left -->
    <path d="M 1040 300 Q 980 260 920 280 Q 870 298 830 320"/>
    <path d="M 1020 240 Q 960 200 900 210 Q 855 218 820 240"/>
    <path d="M 1000 185 Q 942 148 888 155 Q 844 160 810 178"/>
    <!-- Sub branches right -->
    <path d="M 1055 290 Q 1100 255 1130 260 Q 1155 264 1170 280"/>
    <path d="M 1038 225 Q 1080 192 1110 196 Q 1135 200 1150 214"/>
  </g>

  <!-- Leaf dots -->
  <g opacity="0.1" fill="#B8A050">
    <ellipse cx="825" cy="325" rx="5" ry="8" transform="rotate(-15,825,325)"/>
    <ellipse cx="812" cy="243" rx="4" ry="7" transform="rotate(-20,812,243)"/>
    <ellipse cx="804" cy="181" rx="5" ry="8" transform="rotate(-12,804,181)"/>
    <ellipse cx="1172" cy="284" rx="4" ry="7" transform="rotate(18,1172,284)"/>
    <ellipse cx="1154" cy="218" rx="4" ry="6" transform="rotate(15,1154,218)"/>
  </g>

  <!-- Left text overlay -->
  <linearGradient id="textOverlay" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#0A0B05" stop-opacity="0.88"/>
    <stop offset="45%" stop-color="#141508" stop-opacity="0.6"/>
    <stop offset="72%" stop-color="#0F1008" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0F1008" stop-opacity="0"/>
  </linearGradient>
  <rect width="1440" height="480" fill="url(#textOverlay)"/>
  <rect width="1440" height="480" fill="url(#vignette)"/>
  <rect x="0" y="0" width="1440" height="2" fill="url(#shimmer)"/>
  <rect x="0" y="478" width="1440" height="2" fill="url(#shimmer)"/>
</svg>
