<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 580" preserveAspectRatio="xMidYMid slice" width="400" height="580">
  <defs>
    <linearGradient id="mb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#484644"/>
      <stop offset="50%"  stop-color="#555250"/>
      <stop offset="100%" stop-color="#4A4744"/>
    </linearGradient>
    <radialGradient id="mGlow" cx="50%" cy="50%" r="52%">
      <stop offset="0%"   stop-color="#706858" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#555250" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mTopFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C1810" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="#1C1810" stop-opacity="0"/>
      <stop offset="70%"  stop-color="#1C1810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1C1810" stop-opacity="0.65"/>
    </linearGradient>
  </defs>

  <rect width="400" height="580" fill="url(#mb)"/>
