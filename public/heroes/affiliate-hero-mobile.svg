<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 900" width="580" height="900">
  <defs>
    <linearGradient id="mBg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#424040"/>
      <stop offset="35%"  stop-color="#555250"/>
      <stop offset="65%"  stop-color="#5E5A56"/>
      <stop offset="100%" stop-color="#3A3836"/>
    </linearGradient>
    <radialGradient id="mKey" cx="50%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#807060" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5E5A56" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#363230"/>
      <stop offset="100%" stop-color="#1C1810"/>
    </linearGradient>
    <linearGradient id="mGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8A6418"/>
      <stop offset="30%"  stop-color="#C9A96E"/>
      <stop offset="58%"  stop-color="#E8CB85"/>
      <stop offset="80%"  stop-color="#C9A040"/>
      <stop offset="100%" stop-color="#8A6418"/>
    </linearGradient>
    <linearGradient id="phoneBg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%"   stop-color="#2A2420"/>
      <stop offset="100%" stop-color="#141210"/>
    </linearGradient>
    <linearGradient id="phoneEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5A5450"/>
      <stop offset="35%"  stop-color="#8A8480"/>
      <stop offset="70%"  stop-color="#6A6460"/>
      <stop offset="100%" stop-color="#4A4440"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1A1410"/>
      <stop offset="100%" stop-color="#0E0C0A"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2C2418"/>
      <stop offset="100%" stop-color="#1A140E"/>
    </linearGradient>
    <linearGradient id="vigT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C1810" stop-opacity="0.55"/>
      <stop offset="40%"  stop-color="#1C1810" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vigB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#100C08" stop-opacity="0"/>
      <stop offset="100%" stop-color="#100C08" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="mShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="mSoft" x="-15%" y="-10%" width="130%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- BACKDROP -->
  <rect width="580" height="900" fill="url(#mBg)"/>
  <rect width="580" height="900" fill="url(#mKey)"/>
  <rect y="740" width="580" height="160" fill="url(#mFloor)"/>
  <rect y="738" width="580" height="4" fill="#14100C" opacity="0.4"/>

  <!-- ── MAIN PHONE — centred, tilted 5° ── -->
  <g transform="translate(148 55) rotate(5 145 370)" filter="url(#mShadow)">
    <!-- Body -->
    <rect x="0" y="0" width="290" height="560" rx="32" fill="url(#phoneEdge)"/>
    <rect x="4" y="4" width="282" height="552" rx="28" fill="url(#phoneBg)"/>
    <!-- Screen -->
    <rect x="11" y="16" width="268" height="528" rx="20" fill="url(#screenBg)"/>
    <!-- Notch -->
    <rect x="110" y="18" width="70" height="11" rx="5.5" fill="#0A0806"/>
    <!-- Screen glow -->
    <rect x="11" y="16" width="268" height="528" rx="20" fill="url(#mGold)" opacity="0.04"/>
    <!-- Profile circle -->
    <circle cx="145" cy="100" r="36" fill="#2A2015" stroke="#C9A96E" stroke-width="1.5" opacity="0.85"/>
    <circle cx="145" cy="88" r="15" fill="#C9A96E" opacity="0.65"/>
    <ellipse cx="145" cy="117" rx="20" ry="11" fill="#C9A96E" opacity="0.45"/>
    <!-- Username bars -->
    <rect x="60" y="143" width="170" height="9" rx="4.5" fill="#C9A96E" opacity="0.35"/>
    <rect x="88" y="158" width="114" height="6" rx="3" fill="#C9A96E" opacity="0.18"/>
    <!-- Divider -->
    <line x1="22" y1="174" x2="268" y2="174" stroke="#C9A96E" stroke-width="0.6" opacity="0.2"/>
    <!-- Stats row -->
    <rect x="20" y="181" width="56" height="32" rx="5" fill="#C9A96E" opacity="0.07"/>
    <rect x="30" y="185" width="36" height="7" rx="3.5" fill="#C9A96E" opacity="0.4"/>
    <rect x="33" y="197" width="30" height="5" rx="2.5" fill="#C9A96E" opacity="0.2"/>
    <rect x="88" y="181" width="56" height="32" rx="5" fill="#C9A96E" opacity="0.07"/>
    <rect x="98" y="185" width="36" height="7" rx="3.5" fill="#C9A96E" opacity="0.4"/>
    <rect x="101" y="197" width="30" height="5" rx="2.5" fill="#C9A96E" opacity="0.2"/>
    <rect x="156" y="181" width="56" height="32" rx="5" fill="#C9A96E" opacity="0.07"/>
    <rect x="166" y="185" width="36" height="7" rx="3.5" fill="#C9A96E" opacity="0.4"/>
    <rect x="169" y="197" width="30" height="5" rx="2.5" fill="#C9A96E" opacity="0.2"/>
    <rect x="224" y="181" width="36" height="32" rx="5" fill="#C9A96E" opacity="0.07"/>
    <rect x="233" y="192" width="18" height="12" rx="3" fill="#C9A96E" opacity="0.3"/>
    <!-- Post grid 3×2 -->
    <rect x="18" y="222" width="78" height="78" rx="4" fill="#3A2C1C" opacity="0.9"/>
    <rect x="18" y="222" width="78" height="78" rx="4" fill="url(#mGold)" opacity="0.07"/>
    <rect x="104" y="222" width="78" height="78" rx="4" fill="#2C2218" opacity="0.9"/>
    <rect x="104" y="222" width="78" height="78" rx="4" fill="url(#mGold)" opacity="0.1"/>
    <rect x="190" y="222" width="78" height="78" rx="4" fill="#3A2C1C" opacity="0.9"/>
    <rect x="190" y="222" width="78" height="78" rx="4" fill="url(#mGold)" opacity="0.06"/>
    <rect x="18" y="308" width="78" height="78" rx="4" fill="#2C2218" opacity="0.9"/>
    <rect x="18" y="308" width="78" height="78" rx="4" fill="url(#mGold)" opacity="0.08"/>
    <rect x="104" y="308" width="78" height="78" rx="4" fill="#3A2C1C" opacity="0.9"/>
    <rect x="104" y="308" width="78" height="78" rx="4" fill="url(#mGold)" opacity="0.05"/>
    <rect x="190" y="308" width="78" height="78" rx="4" fill="#2C2218" opacity="0.9"/>
    <rect x="190" y="308" width="78" height="78" rx="4" fill="url(#mGold)" opacity="0.09"/>
    <!-- Hair silhouettes in grid -->
    <ellipse cx="57"  cy="261" rx="22" ry="30" fill="#C9A96E" opacity="0.12"/>
    <ellipse cx="143" cy="261" rx="20" ry="28" fill="#C9A96E" opacity="0.15"/>
    <ellipse cx="229" cy="261" rx="22" ry="30" fill="#C9A96E" opacity="0.10"/>
    <ellipse cx="57"  cy="347" rx="20" ry="26" fill="#C9A96E" opacity="0.13"/>
    <ellipse cx="143" cy="347" rx="22" ry="30" fill="#C9A96E" opacity="0.11"/>
    <ellipse cx="229" cy="347" rx="20" ry="26" fill="#C9A96E" opacity="0.14"/>
    <!-- Engagement bar -->
    <rect x="18" y="396" width="254" height="34" rx="7" fill="#1E1810" opacity="0.75"/>
    <rect x="27" y="404" width="70" height="8" rx="4" fill="#C9A96E" opacity="0.5"/>
    <rect x="112" y="404" width="46" height="8" rx="4" fill="#C9A96E" opacity="0.25"/>
    <rect x="173" y="404" width="85" height="8" rx="4" fill="url(#mGold)" opacity="0.55"/>
    <!-- Commission pill -->
    <rect x="18" y="440" width="254" height="36" rx="9" fill="#B68A45" opacity="0.18"/>
    <rect x="18" y="440" width="254" height="36" rx="9" fill="none" stroke="#C9A96E" stroke-width="0.9" opacity="0.5"/>
    <text x="145" y="463" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" font-weight="700" fill="#C9A96E" letter-spacing="2.5" opacity="0.9">AFFILIATE EARNINGS</text>
    <!-- Home bar -->
    <rect x="105" y="528" width="80" height="4" rx="2" fill="#C9A96E" opacity="0.22"/>
  </g>

  <!-- ── COMMISSION CARD — bottom left ── -->
  <g transform="translate(18 635)" filter="url(#mSoft)">
    <rect x="0" y="0" width="250" height="118" rx="12" fill="url(#cardBg)"/>
    <rect x="0" y="0" width="250" height="118" rx="12" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    <path d="M8 0 L0 8 M242 0 L250 8 M0 110 L8 118 M250 110 L242 118" stroke="#C9A96E" stroke-width="0.8" opacity="0.3" fill="none"/>
    <text x="16" y="22" font-family="Montserrat,sans-serif" font-size="7.5" font-weight="700" letter-spacing="2" fill="#C9A96E" opacity="0.65">COMMISSION EARNED</text>
    <line x1="16" y1="28" x2="234" y2="28" stroke="#C9A96E" stroke-width="0.5" opacity="0.2"/>
    <text x="16" y="68" font-family="'Cormorant Garamond',Georgia,serif" font-size="42" font-weight="300" fill="#C9A96E">€2,840</text>
    <text x="16" y="84" font-family="Montserrat,sans-serif" font-size="8" fill="#C9A96E" opacity="0.4" letter-spacing="1">This month</text>
    <rect x="16" y="94" width="218" height="5" rx="2.5" fill="#2A2015"/>
    <rect x="16" y="94" width="163" height="5" rx="2.5" fill="url(#mGold)" opacity="0.8"/>
    <text x="234" y="99" text-anchor="end" font-family="Montserrat,sans-serif" font-size="7" font-weight="700" fill="#C9A96E" opacity="0.5">75%</text>
    <text x="16" y="112" font-family="Montserrat,sans-serif" font-size="7" fill="#C9A96E" opacity="0.28" letter-spacing="0.8">Next tier at €3,800</text>
  </g>

  <!-- ── BADGE — bottom right ── -->
  <g transform="translate(450 650)">
    <circle cx="48" cy="48" r="48" fill="#2A2015" stroke="#C9A96E" stroke-width="0.9" opacity="0.88"/>
    <text x="48" y="38" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="8.5" font-weight="700" letter-spacing="1" fill="#C9A96E" opacity="0.65">UP TO</text>
    <text x="48" y="58" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="26" font-weight="300" fill="#C9A96E">15%</text>
    <text x="48" y="72" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="6.5" font-weight="700" letter-spacing="1.5" fill="#C9A96E" opacity="0.5">COMMISSION</text>
  </g>

  <!-- ── REFERRAL TAG — top right ── -->
  <g transform="translate(310 28)" opacity="0.7">
    <rect x="0" y="0" width="250" height="50" rx="9" fill="#2A2015" opacity="0.95"/>
    <rect x="0" y="0" width="250" height="50" rx="9" fill="none" stroke="#C9A96E" stroke-width="0.7" opacity="0.4"/>
    <text x="14" y="15" font-family="Montserrat,sans-serif" font-size="7" font-weight="700" letter-spacing="2" fill="#C9A96E" opacity="0.6">REFERRAL LINK</text>
    <rect x="14" y="20" width="222" height="17" rx="4" fill="#1A1410"/>
    <text x="22" y="31.5" font-family="Montserrat,sans-serif" font-size="8" fill="#C9A96E" opacity="0.5">olivhairsupply.de/?ref=</text>
    <rect x="208" y="22" width="22" height="13" rx="3" fill="url(#mGold)" opacity="0.7"/>
    <text x="219" y="31.5" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="7" font-weight="700" fill="#1A1410">GO</text>
  </g>

  <!-- VIGNETTES -->
  <rect width="580" height="900" fill="url(#vigT)"/>
  <rect width="580" height="900" fill="url(#vigB)"/>
</svg>
