<svg xmlns="http://www.w3.org/2000/svg" viewBox="-308 -124 2057 829" preserveAspectRatio="xMidYMid slice" width="1440" height="580">
  <defs>
    <!-- Backdrop — exact wholesale palette -->
    <linearGradient id="aBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#424040"/>
      <stop offset="28%"  stop-color="#555250"/>
      <stop offset="54%"  stop-color="#5E5A56"/>
      <stop offset="78%"  stop-color="#575350"/>
      <stop offset="100%" stop-color="#4A4744"/>
    </linearGradient>
    <linearGradient id="aTopS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C1810" stop-opacity="0.52"/>
      <stop offset="38%"  stop-color="#1C1810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#100C08" stop-opacity="0.38"/>
    </linearGradient>
    <radialGradient id="aKey" cx="60%" cy="12%" r="55%">
      <stop offset="0%"   stop-color="#807060" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5E5A56" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#363230"/>
      <stop offset="100%" stop-color="#242018"/>
    </linearGradient>
    <!-- Vignettes -->
    <linearGradient id="vigL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vigR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="vigB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D0D0D0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#D0D0D0" stop-opacity="0.28"/>
    </linearGradient>
    <!-- Gold -->
    <linearGradient id="aGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8A6418"/>
      <stop offset="28%"  stop-color="#C9A96E"/>
      <stop offset="55%"  stop-color="#E8CB85"/>
      <stop offset="80%"  stop-color="#C9A040"/>
      <stop offset="100%" stop-color="#8A6418"/>
    </linearGradient>
    <linearGradient id="aGoldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#B8900A"/>
      <stop offset="50%"  stop-color="#E8C858"/>
      <stop offset="100%" stop-color="#C09828"/>
    </linearGradient>
    <!-- Phone body -->
    <linearGradient id="phoneBg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%"   stop-color="#2A2420"/>
      <stop offset="40%"  stop-color="#1E1A16"/>
      <stop offset="100%" stop-color="#141210"/>
    </linearGradient>
    <linearGradient id="phoneEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5A5450"/>
      <stop offset="30%"  stop-color="#8A8480"/>
      <stop offset="70%"  stop-color="#6A6460"/>
      <stop offset="100%" stop-color="#4A4440"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1A1410"/>
      <stop offset="100%" stop-color="#0E0C0A"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2C2418"/>
      <stop offset="100%" stop-color="#1A140E"/>
    </linearGradient>
    <!-- Shadow -->
    <filter id="aShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="aSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="aGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ── BACKDROP ── -->
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#aBg)"/>
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#aTopS)"/>
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#aKey)"/>
  <rect x="-308" y="438"  width="2057" height="267" fill="url(#aFloor)"/>
  <rect x="-308" y="436"  width="2057" height="5"   fill="#14100C" opacity="0.38"/>

  <!-- ── MAIN PHONE (centred slightly right, tilted 8deg) ── -->
  <g transform="translate(728 -30) rotate(8 130 350)" filter="url(#aShadow)">
    <!-- Phone body -->
    <rect x="0" y="0" width="260" height="490" rx="28" fill="url(#phoneEdge)"/>
    <rect x="4" y="4" width="252" height="482" rx="24" fill="url(#phoneBg)"/>
    <!-- Screen -->
    <rect x="10" y="14" width="240" height="460" rx="18" fill="url(#screenBg)"/>
    <!-- Notch -->
    <rect x="95" y="16" width="70" height="10" rx="5" fill="#0A0806"/>
    <!-- Screen content — gradient wash -->
    <rect x="10" y="14" width="240" height="460" rx="18" fill="url(#aGold)" opacity="0.04"/>
    <!-- Profile area -->
    <circle cx="130" cy="90" r="32" fill="#2A2015" stroke="#C9A96E" stroke-width="1.5" opacity="0.85"/>
    <!-- Silhouette head -->
    <circle cx="130" cy="80" r="13" fill="#C9A96E" opacity="0.7"/>
    <ellipse cx="130" cy="104" rx="18" ry="10" fill="#C9A96E" opacity="0.5"/>
    <!-- Username bar -->
    <rect x="50" y="128" width="160" height="8" rx="4" fill="#C9A96E" opacity="0.35"/>
    <rect x="75" y="142" width="110" height="5" rx="2.5" fill="#C9A96E" opacity="0.18"/>
    <!-- Divider -->
    <line x1="20" y1="158" x2="240" y2="158" stroke="#C9A96E" stroke-width="0.5" opacity="0.2"/>
    <!-- Stats row -->
    <rect x="18" y="165" width="50" height="28" rx="4" fill="#C9A96E" opacity="0.08"/>
    <rect x="27" y="168" width="32" height="6" rx="3" fill="#C9A96E" opacity="0.4"/>
    <rect x="30" y="178" width="26" height="4" rx="2" fill="#C9A96E" opacity="0.2"/>
    <rect x="78" y="165" width="50" height="28" rx="4" fill="#C9A96E" opacity="0.08"/>
    <rect x="87" y="168" width="32" height="6" rx="3" fill="#C9A96E" opacity="0.4"/>
    <rect x="90" y="178" width="26" height="4" rx="2" fill="#C9A96E" opacity="0.2"/>
    <rect x="138" y="165" width="50" height="28" rx="4" fill="#C9A96E" opacity="0.08"/>
    <rect x="147" y="168" width="32" height="6" rx="3" fill="#C9A96E" opacity="0.4"/>
    <rect x="150" y="178" width="26" height="4" rx="2" fill="#C9A96E" opacity="0.2"/>
    <rect x="198" y="165" width="32" height="28" rx="4" fill="#C9A96E" opacity="0.08"/>
    <rect x="206" y="174" width="16" height="10" rx="3" fill="#C9A96E" opacity="0.3"/>
    <!-- Post grid — 3x2 -->
    <!-- Row 1 -->
    <rect x="16" y="202" width="70" height="70" rx="3" fill="#3A2C1C" opacity="0.9"/>
    <rect x="16" y="202" width="70" height="70" rx="3" fill="url(#aGold)" opacity="0.07"/>
    <rect x="94" y="202" width="70" height="70" rx="3" fill="#2C2218" opacity="0.9"/>
    <rect x="94" y="202" width="70" height="70" rx="3" fill="url(#aGold)" opacity="0.1"/>
    <rect x="172" y="202" width="70" height="70" rx="3" fill="#3A2C1C" opacity="0.9"/>
    <rect x="172" y="202" width="70" height="70" rx="3" fill="url(#aGold)" opacity="0.06"/>
    <!-- Row 2 -->
    <rect x="16" y="278" width="70" height="70" rx="3" fill="#2C2218" opacity="0.9"/>
    <rect x="16" y="278" width="70" height="70" rx="3" fill="url(#aGold)" opacity="0.08"/>
    <rect x="94" y="278" width="70" height="70" rx="3" fill="#3A2C1C" opacity="0.9"/>
    <rect x="94" y="278" width="70" height="70" rx="3" fill="url(#aGold)" opacity="0.05"/>
    <rect x="172" y="278" width="70" height="70" rx="3" fill="#2C2218" opacity="0.9"/>
    <rect x="172" y="278" width="70" height="70" rx="3" fill="url(#aGold)" opacity="0.09"/>
    <!-- Hair strand illustrations in grid cells -->
    <ellipse cx="51" cy="237" rx="20" ry="28" fill="#C9A96E" opacity="0.12"/>
    <ellipse cx="129" cy="237" rx="18" ry="26" fill="#C9A96E" opacity="0.15"/>
    <ellipse cx="207" cy="237" rx="20" ry="28" fill="#C9A96E" opacity="0.1"/>
    <ellipse cx="51" cy="313" rx="18" ry="24" fill="#C9A96E" opacity="0.14"/>
    <ellipse cx="129" cy="313" rx="20" ry="28" fill="#C9A96E" opacity="0.11"/>
    <ellipse cx="207" cy="313" rx="18" ry="24" fill="#C9A96E" opacity="0.13"/>
    <!-- Engagement bar -->
    <rect x="16" y="356" width="228" height="30" rx="6" fill="#1E1810" opacity="0.7"/>
    <rect x="24" y="363" width="60" height="7" rx="3.5" fill="#C9A96E" opacity="0.5"/>
    <rect x="100" y="363" width="40" height="7" rx="3.5" fill="#C9A96E" opacity="0.25"/>
    <rect x="156" y="363" width="76" height="7" rx="3.5" fill="url(#aGold)" opacity="0.55"/>
    <!-- Commission pill at bottom -->
    <rect x="20" y="395" width="220" height="32" rx="8" fill="#B68A45" opacity="0.18"/>
    <rect x="20" y="395" width="220" height="32" rx="8" fill="none" stroke="#C9A96E" stroke-width="0.8" opacity="0.5"/>
    <text x="130" y="416" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="9" font-weight="700" fill="#C9A96E" letter-spacing="2" opacity="0.9">AFFILIATE EARNINGS</text>
    <!-- Home bar -->
    <rect x="90" y="456" width="80" height="4" rx="2" fill="#C9A96E" opacity="0.25"/>
  </g>

  <!-- ── SECOND PHONE (background, left-tilted) ── -->
  <g transform="translate(530 30) rotate(-6 130 350)" opacity="0.55" filter="url(#aSoft)">
    <rect x="0" y="0" width="220" height="420" rx="24" fill="url(#phoneEdge)"/>
    <rect x="3" y="3" width="214" height="414" rx="21" fill="#181410"/>
    <rect x="8" y="12" width="204" height="396" rx="16" fill="#0E0C0A"/>
    <rect x="8" y="12" width="204" height="396" rx="16" fill="url(#aGold)" opacity="0.04"/>
    <!-- Notification cards on screen -->
    <rect x="14" y="30" width="180" height="42" rx="8" fill="#2A2015" opacity="0.9"/>
    <rect x="14" y="30" width="180" height="42" rx="8" fill="none" stroke="#C9A96E" stroke-width="0.6" opacity="0.35"/>
    <circle cx="32" cy="51" r="9" fill="#C9A96E" opacity="0.3"/>
    <rect x="48" y="38" width="100" height="5" rx="2.5" fill="#C9A96E" opacity="0.4"/>
    <rect x="48" y="49" width="72" height="4" rx="2" fill="#C9A96E" opacity="0.2"/>
    <rect x="160" y="41" width="26" height="12" rx="4" fill="url(#aGold)" opacity="0.6"/>
    <text x="173" y="50.5" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="6" font-weight="700" fill="#2A2015" letter-spacing="0.5">+€18</text>
    <rect x="14" y="80" width="180" height="42" rx="8" fill="#2A2015" opacity="0.9"/>
    <rect x="14" y="80" width="180" height="42" rx="8" fill="none" stroke="#C9A96E" stroke-width="0.6" opacity="0.35"/>
    <circle cx="32" cy="101" r="9" fill="#C9A96E" opacity="0.3"/>
    <rect x="48" y="88" width="90" height="5" rx="2.5" fill="#C9A96E" opacity="0.4"/>
    <rect x="48" y="99" width="64" height="4" rx="2" fill="#C9A96E" opacity="0.2"/>
    <rect x="160" y="91" width="26" height="12" rx="4" fill="url(#aGold)" opacity="0.6"/>
    <text x="173" y="100.5" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="6" font-weight="700" fill="#2A2015" letter-spacing="0.5">+€34</text>
    <rect x="14" y="130" width="180" height="42" rx="8" fill="#2A2015" opacity="0.9"/>
    <rect x="14" y="130" width="180" height="42" rx="8" fill="none" stroke="#C9A96E" stroke-width="0.6" opacity="0.35"/>
    <circle cx="32" cy="151" r="9" fill="#C9A96E" opacity="0.3"/>
    <rect x="48" y="138" width="110" height="5" rx="2.5" fill="#C9A96E" opacity="0.4"/>
    <rect x="48" y="149" width="80" height="4" rx="2" fill="#C9A96E" opacity="0.2"/>
    <rect x="160" y="141" width="26" height="12" rx="4" fill="url(#aGold)" opacity="0.6"/>
    <text x="173" y="150.5" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="6" font-weight="700" fill="#2A2015" letter-spacing="0.5">+€52</text>
    <!-- Content preview -->
    <rect x="14" y="185" width="180" height="160" rx="8" fill="#2A2015" opacity="0.7"/>
    <rect x="14" y="185" width="180" height="160" rx="8" fill="url(#aGold)" opacity="0.05"/>
    <ellipse cx="104" cy="255" rx="45" ry="58" fill="#C9A96E" opacity="0.1"/>
    <!-- Stats strip -->
    <rect x="14" y="357" width="180" height="24" rx="5" fill="#1E1810" opacity="0.8"/>
    <rect x="22" y="362" width="48" height="5" rx="2.5" fill="#C9A96E" opacity="0.4"/>
    <rect x="80" y="362" width="36" height="5" rx="2.5" fill="#C9A96E" opacity="0.25"/>
    <rect x="130" y="362" width="52" height="5" rx="2.5" fill="url(#aGold)" opacity="0.45"/>
    <!-- Home bar -->
    <rect x="74" y="394" width="68" height="3" rx="1.5" fill="#C9A96E" opacity="0.2"/>
  </g>

  <!-- ── FLOATING COMMISSION CARD (right side) ── -->
  <g transform="translate(1040 80)" filter="url(#aSoft)">
    <rect x="0" y="0" width="220" height="110" rx="12" fill="url(#cardBg)"/>
    <rect x="0" y="0" width="220" height="110" rx="12" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>
    <!-- Corner decoration -->
    <path d="M8 0 L0 8 M212 0 L220 8 M0 102 L8 110 M220 102 L212 110" stroke="#C9A96E" stroke-width="0.8" opacity="0.35" fill="none"/>
    <text x="16" y="22" font-family="Montserrat,sans-serif" font-size="7" font-weight="700" letter-spacing="2.5" fill="#C9A96E" opacity="0.7">COMMISSION EARNED</text>
    <line x1="16" y1="27" x2="204" y2="27" stroke="#C9A96E" stroke-width="0.5" opacity="0.2"/>
    <text x="16" y="62" font-family="'Cormorant Garamond',Georgia,serif" font-size="38" font-weight="300" fill="#C9A96E">€2,840</text>
    <text x="16" y="78" font-family="Montserrat,sans-serif" font-size="7.5" fill="#C9A96E" opacity="0.45" letter-spacing="1">This month</text>
    <!-- Progress bar -->
    <rect x="16" y="88" width="188" height="4" rx="2" fill="#2A2015"/>
    <rect x="16" y="88" width="141" height="4" rx="2" fill="url(#aGold)" opacity="0.8"/>
    <text x="204" y="92" text-anchor="end" font-family="Montserrat,sans-serif" font-size="6" font-weight="700" fill="#C9A96E" opacity="0.55">75%</text>
    <text x="16" y="103" font-family="Montserrat,sans-serif" font-size="6" fill="#C9A96E" opacity="0.3" letter-spacing="0.8">Next tier at €3,800</text>
  </g>

  <!-- ── FLOATING LINK TAG (top right) ── -->
  <g transform="translate(1090 -20)" opacity="0.75">
    <rect x="0" y="0" width="170" height="44" rx="8" fill="#2A2015" opacity="0.95"/>
    <rect x="0" y="0" width="170" height="44" rx="8" fill="none" stroke="#C9A96E" stroke-width="0.7" opacity="0.4"/>
    <text x="12" y="13" font-family="Montserrat,sans-serif" font-size="6.5" font-weight="700" letter-spacing="2" fill="#C9A96E" opacity="0.6">REFERRAL LINK</text>
    <rect x="12" y="18" width="146" height="14" rx="4" fill="#1A1410"/>
    <text x="20" y="28.5" font-family="Montserrat,sans-serif" font-size="7" fill="#C9A96E" opacity="0.5" letter-spacing="0.5">olivhairsupply.de/?ref=</text>
    <rect x="138" y="20" width="18" height="10" rx="3" fill="url(#aGold)" opacity="0.7"/>
    <text x="147" y="27.5" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="6" font-weight="700" fill="#1A1410">GO</text>
  </g>

  <!-- ── FLOATING BADGE (lower left of phone cluster) ── -->
  <g transform="translate(490 350)" opacity="0.7">
    <circle cx="36" cy="36" r="36" fill="#2A2015" stroke="#C9A96E" stroke-width="0.8" opacity="0.9"/>
    <text x="36" y="28" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="7.5" font-weight="700" letter-spacing="1" fill="#C9A96E" opacity="0.7">UP TO</text>
    <text x="36" y="44" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="20" font-weight="300" fill="#C9A96E">15%</text>
    <text x="36" y="56" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="6" font-weight="700" letter-spacing="1.5" fill="#C9A96E" opacity="0.5">COMMISSION</text>
  </g>

  <!-- ── THIN CONNECTION LINES (network effect) ── -->
  <g opacity="0.18" stroke="#C9A96E" stroke-width="0.7" fill="none">
    <line x1="526" y1="386" x2="660" y2="290"/>
    <line x1="860" y1="60"  x2="1090" y2="24"/>
    <line x1="860" y1="160" x2="1040" y2="130"/>
    <circle cx="526" cy="386" r="3" fill="#C9A96E" opacity="0.5"/>
    <circle cx="860" cy="60"  r="3" fill="#C9A96E" opacity="0.5"/>
    <circle cx="860" cy="160" r="3" fill="#C9A96E" opacity="0.5"/>
    <circle cx="1040" cy="130" r="3" fill="#C9A96E" opacity="0.4"/>
    <circle cx="1090" cy="24"  r="3" fill="#C9A96E" opacity="0.4"/>
  </g>

  <!-- ── VIGNETTES ── -->
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#vigL)"/>
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#vigR)"/>
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#vigB)"/>
</svg>
