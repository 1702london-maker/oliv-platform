  <path d="M 858 88 Q 900 74 942 88" stroke="#6B4020" stroke-width="16" fill="none" opacity="0.45" stroke-linecap="round"/>
  <path d="M 866 84 Q 900 72 934 84" stroke="#9A6030" stroke-width="8" fill="none" opacity="0.38" stroke-linecap="round"/>
  <path d="M 874 80 Q 900 70 926 80" stroke="#C08040" stroke-width="4" fill="none" opacity="0.30" stroke-linecap="round"/>

