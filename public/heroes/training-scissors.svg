  <g transform="translate(590, 145) rotate(-28)">
    <path d="M-4.5,0 L-5,134 Q-0.5,142 4.5,134 L5,0 Q0.5,-6.5 -4.5,0 Z" fill="url(#bladeSc)" opacity="0.96"/>
    <line x1="-2" y1="6" x2="-2.5" y2="127" stroke="#F0F0F8" stroke-width="0.9" opacity="0.5"/>
    <path d="M11,0 L10.5,134 Q14.5,142 18.5,134 L19.5,0 Q15.5,-6.5 11,0 Z" fill="url(#bladeSc)" opacity="0.88"/>
    <circle cx="7.5" cy="0" r="10.5" fill="url(#pvtSc)"/>
    <circle cx="7.5" cy="0" r="6.5" fill="#C89C28"/>
    <circle cx="7.5" cy="0" r="2.5" fill="#F0D870"/>
    <!-- Lower handle loop -->
    <path d="M-5,134 Q-20,165 -11,194 Q-4,214 7.5,207 Q19,194 16,164 Q14,142 5,134 Z" fill="url(#hndlSc)"/>
    <path d="M-3,140 Q-16,167 -10,190 Q-3,208 6,202 Q16,190 14,164 Q12,143 4,140 Z" fill="#1A1608" opacity="0.83"/>
    <!-- Upper handle loop -->
    <path d="M5,134 Q22,143 28,132 Q36,118 28,103 Q18,92 5,102 Q-2,113 -2,125 Z" fill="url(#hndlSc)"/>
    <path d="M6.5,130 Q20,138 24,129 Q31,116 24,103 Q15,95 6.5,102 Q0.5,112 0.5,123 Z" fill="#1A1608" opacity="0.83"/>
  </g>

