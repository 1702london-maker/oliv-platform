  <ellipse cx="900" cy="498" rx="130" ry="12" fill="#080604" opacity="0.48" filter="url(#scBlur)"/>
  <!-- Pedestal base plate -->
  <ellipse cx="900" cy="495" rx="100" ry="9" fill="#1A1614" opacity="0.9"/>
  <!-- Pedestal column -->
  <rect x="882" y="358" width="36" height="138" fill="url(#chairMetal)"/>
  <rect x="886" y="358" width="9" height="138" fill="#888280" opacity="0.32"/>
  <!-- Hydraulic body -->
  <rect x="874" y="335" width="52" height="32" rx="5" fill="#2A2620"/>
  <rect x="877" y="337" width="46" height="28" rx="4" fill="#3A3430"/>
  <!-- Seat cushion -->
  <rect x="800" y="295" width="200" height="65" rx="20" fill="url(#chairLeather)"/>
  <rect x="802" y="297" width="196" height="22" rx="14" fill="#282420" opacity="0.6"/>
  <line x1="830" y1="312" x2="970" y2="312" stroke="#3A3430" stroke-width="0.9" opacity="0.45"/>
  <line x1="830" y1="334" x2="970" y2="334" stroke="#3A3430" stroke-width="0.9" opacity="0.38"/>
  <!-- Backrest -->
