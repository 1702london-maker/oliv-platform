      <stop offset="30%"  stop-color="#6A6460"/>
      <stop offset="60%"  stop-color="#888280"/>
      <stop offset="80%"  stop-color="#5A5450"/>
      <stop offset="100%" stop-color="#3A3430"/>
    </linearGradient>
    <linearGradient id="chairGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#A07818"/>
      <stop offset="40%"  stop-color="#C9A96E"/>
