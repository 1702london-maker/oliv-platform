  <path d="M 808 268 Q 834 252 858 248 Q 874 244 900 244 Q 926 244 942 248 Q 966 252 992 268 Q 1006 276 1010 290 L 790 290 Q 794 276 808 268 Z" fill="#2A2420" opacity="0.88"/>
