  <rect x="838" y="134" width="124" height="170" rx="18" fill="#1A1614"/>
  <line x1="855" y1="175" x2="957" y2="175" stroke="#2A2420" stroke-width="0.9" opacity="0.4"/>
  <line x1="855" y1="225" x2="957" y2="225" stroke="#2A2420" stroke-width="0.8" opacity="0.35"/>
  <line x1="855" y1="272" x2="957" y2="272" stroke="#2A2420" stroke-width="0.8" opacity="0.32"/>
  <text x="900" y="212" font-family="'Cormorant Garamond',Georgia,serif" font-size="15" font-style="italic" fill="#C9A96E" text-anchor="middle" letter-spacing="3.5" opacity="0.35">OHS</text>
  <!-- Gold footrest -->
  <rect x="788" y="418" width="224" height="9" rx="4.5" fill="url(#chairGold)"/>
  <ellipse cx="793" cy="422" rx="6" ry="6" fill="#C9A96E" opacity="0.9"/>
  <ellipse cx="1007" cy="422" rx="6" ry="6" fill="#C9A96E" opacity="0.9"/>
  <!-- Armrests -->
  <rect x="794" y="278" width="14" height="55" rx="4" fill="url(#chairMetal)"/>
