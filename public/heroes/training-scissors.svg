  <g transform="translate(440, 338) rotate(-12)" opacity="0.88">
    <path d="M-4.5,0 L-5,96 Q-0.5,102 4.5,96 L5,0 Q0.5,-5 -4.5,0 Z" fill="url(#combH)"/>
    <rect x="-4.5" y="88" width="9.5" height="10" rx="1" fill="#C9A030" opacity="0.85"/>
    <rect x="-13" y="-62" width="26" height="88" rx="6" fill="#242018"/>
    <line x1="-4" y1="-60" x2="-4" y2="24" stroke="#3A3228" stroke-width="1.2" opacity="0.6"/>
    <g stroke="#888070" stroke-width="2.8" stroke-linecap="round">
      <line x1="-25" y1="-46" x2="-13" y2="-46"/>
      <line x1="-26" y1="-34" x2="-13" y2="-34"/>
      <line x1="-26" y1="-22" x2="-13" y2="-22"/>
      <line x1="-26" y1="-10" x2="-13" y2="-10"/>
      <line x1="-25" y1="2"   x2="-13" y2="2"/>
    </g>
    <g stroke="#706858" stroke-width="1.3" stroke-linecap="round">
      <line x1="13" y1="-54" x2="26" y2="-54"/>
      <line x1="13" y1="-46" x2="26" y2="-46"/>
      <line x1="13" y1="-38" x2="26" y2="-38"/>
      <line x1="13" y1="-30" x2="26" y2="-30"/>
      <line x1="13" y1="-22" x2="26" y2="-22"/>
      <line x1="13" y1="-14" x2="26" y2="-14"/>
      <line x1="13" y1="-6"  x2="26" y2="-6"/>
      <line x1="13" y1="2"   x2="26" y2="2"/>
      <line x1="13" y1="10"  x2="26" y2="10"/>
    </g>
    <text x="0" y="66" font-family="'Cormorant Garamond',Georgia,serif" font-size="12" font-style="italic" fill="#C9A96E" text-anchor="middle" letter-spacing="2.5" opacity="0.88">BIZILUXE</text>
    <ellipse cx="0" cy="106" rx="16" ry="3.5" fill="#060402" opacity="0.32"/>
  </g>

  <!-- ─── BRAND PLACARD ─── -->
  <rect x="110" y="262" width="258" height="100" fill="url(#bkFace)"/>
  <rect x="110" y="254" width="258" height="10" fill="url(#bkTop)"/>
  <rect x="366" y="262" width="26" height="100" fill="#0C0A08" opacity="0.9"/>
  <rect x="366" y="254" width="26" height="10" fill="#0A0808"/>
  <line x1="112" y1="287" x2="364" y2="287" stroke="#C9A96E" stroke-width="0.8" opacity="0.45"/>
  <line x1="112" y1="348" x2="364" y2="348" stroke="#C9A96E" stroke-width="0.8" opacity="0.45"/>
  <text x="238" y="314" font-family="'Cormorant Garamond',Georgia,serif" font-size="22" font-weight="300" fill="url(#goldT)" text-anchor="middle" letter-spacing="4.5" opacity="0.97">OLIVHAIRSUPPLY</text>
  <text x="238" y="336" font-family="'Cormorant Garamond',Georgia,serif" font-size="10" font-style="italic" fill="#D4B87A" text-anchor="middle" letter-spacing="4" opacity="0.90">Academy · Berlin</text>

  <!-- ─── OVERLAYS ─── -->
  <rect width="1440" height="580" fill="url(#scTextOv)"/>
  <rect width="1440" height="580" fill="url(#scVig)"/>
</svg>
