  <path d="M 808 270 Q 840 255 868 250 L 888 262 Q 870 272 848 284 Q 822 296 806 296 Z" fill="url(#skinShoulder)" opacity="0.80"/>
  <path d="M 992 270 Q 960 255 932 250 L 912 262 Q 930 272 952 284 Q 978 296 994 296 Z" fill="url(#skinShoulder)" opacity="0.80"/>

