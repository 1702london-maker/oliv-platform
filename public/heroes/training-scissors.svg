    <path d="M 850 62 Q 828 172 824 286 Q 820 398 826 488" stroke="#281608" stroke-width="4"/>
    <path d="M 864 60 Q 843 170 839 284 Q 835 396 840 486" stroke="#1E1006" stroke-width="3.5"/>
    <path d="M 878 58 Q 858 168 854 282 Q 850 394 855 484" stroke="#261408" stroke-width="4"/>
    <path d="M 892 57 Q 874 167 870 281 Q 866 393 870 483" stroke="#2C1A08" stroke-width="3.5"/>
    <path d="M 906 57 Q 889 167 885 281 Q 881 393 885 483" stroke="#221008" stroke-width="4"/>
    <path d="M 920 58 Q 905 168 901 282 Q 897 394 901 484" stroke="#2A1608" stroke-width="3.5"/>
    <path d="M 934 60 Q 921 170 918 284 Q 915 396 918 485" stroke="#1E0E06" stroke-width="4.5"/>
    <path d="M 948 62 Q 937 172 934 286 Q 931 398 934 487" stroke="#2C1A08" stroke-width="4"/>
    <path d="M 962 66 Q 953 175 951 289 Q 949 401 952 489" stroke="#221208" stroke-width="3.5"/>
    <path d="M 976 72 Q 970 180 968 293 Q 966 405 969 490" stroke="#281608" stroke-width="4"/>
  </g>
