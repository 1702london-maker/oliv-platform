<svg xmlns="http://www.w3.org/2000/svg" viewBox="-308 -124 2057 829" preserveAspectRatio="xMidYMid slice" width="1440" height="580">
  <defs>
    <!-- Studio backdrop — exact wholesale palette -->
    <linearGradient id="jBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#424040"/>
      <stop offset="28%"  stop-color="#555250"/>
      <stop offset="54%"  stop-color="#5E5A56"/>
      <stop offset="78%"  stop-color="#575350"/>
      <stop offset="100%" stop-color="#4A4744"/>
    </linearGradient>
    <linearGradient id="jTopS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C1810" stop-opacity="0.52"/>
      <stop offset="38%"  stop-color="#1C1810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#100C08" stop-opacity="0.38"/>
    </linearGradient>
    <radialGradient id="jKey" cx="60%" cy="10%" r="55%">
      <stop offset="0%"   stop-color="#807060" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5E5A56" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="jFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#363230"/>
      <stop offset="100%" stop-color="#242018"/>
    </linearGradient>

    <!-- Vignettes -->
    <linearGradient id="vigL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vigR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="vigB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D0D0D0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#D0D0D0" stop-opacity="0.28"/>
    </linearGradient>

    <!-- Gold gradients -->
    <linearGradient id="jGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8A6418"/>
      <stop offset="25%"  stop-color="#C9A96E"/>
      <stop offset="50%"  stop-color="#E8CB85"/>
      <stop offset="75%"  stop-color="#C9A040"/>
      <stop offset="100%" stop-color="#8A6418"/>
    </linearGradient>
    <linearGradient id="jGoldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8A6418"/>
      <stop offset="35%"  stop-color="#C9A96E"/>
      <stop offset="65%"  stop-color="#D4B478"/>
      <stop offset="100%" stop-color="#9A7018"/>
    </linearGradient>
    <linearGradient id="jGoldT" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#B8900A"/>
      <stop offset="50%"  stop-color="#E8C858"/>
      <stop offset="100%" stop-color="#C09828"/>
    </linearGradient>

    <!-- Book page gradient — warm ivory -->
    <linearGradient id="jPageL" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#F5EDD8"/>
      <stop offset="40%"  stop-color="#EDE0C4"/>
      <stop offset="100%" stop-color="#C8B898" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="jPageR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F5EDD8"/>
      <stop offset="40%"  stop-color="#EDE0C4"/>
      <stop offset="100%" stop-color="#C8B898" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Book cover gradient — dark luxury -->
    <linearGradient id="jCoverL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#181410"/>
      <stop offset="60%"  stop-color="#241C14"/>
      <stop offset="100%" stop-color="#2C2418"/>
    </linearGradient>
    <linearGradient id="jCoverR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#181410"/>
      <stop offset="60%"  stop-color="#241C14"/>
      <stop offset="100%" stop-color="#2C2418"/>
    </linearGradient>
    <linearGradient id="jSpine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1A1410"/>
      <stop offset="50%"  stop-color="#2C2018"/>
      <stop offset="100%" stop-color="#1A1410"/>
    </linearGradient>

    <!-- Page edge shimmer -->
    <linearGradient id="jEdgeL" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#C9A96E"/>
      <stop offset="40%"  stop-color="#E8CB85"/>
      <stop offset="100%" stop-color="#9A7020"/>
    </linearGradient>
    <linearGradient id="jEdgeR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C9A96E"/>
      <stop offset="40%"  stop-color="#E8CB85"/>
      <stop offset="100%" stop-color="#9A7020"/>
    </linearGradient>

    <!-- Book shadow -->
    <filter id="jShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="jSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- ── BACKDROP ── -->
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#jBg)"/>
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#jTopS)"/>
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#jKey)"/>
  <rect x="-308" y="430"  width="2057" height="275" fill="url(#jFloor)"/>
  <rect x="-308" y="428"  width="2057" height="5"   fill="#14100C" opacity="0.38"/>

  <!-- ── BOOK SHADOW on floor ── -->
  <ellipse cx="682" cy="448" rx="420" ry="24" fill="#000" opacity="0.38" filter="url(#jSoft)"/>

  <!-- ═══════════════════════════════════════════════════════
       OPEN BOOK — centred at x:682, top y:-80, bottom y:440
  ═══════════════════════════════════════════════════════ -->
  <g filter="url(#jShadow)">

    <!-- ── LEFT COVER (outside, face down) ── -->
    <path d="M 232 -80 Q 210 -76 200 -60 L 200 430 Q 210 444 232 448 L 678 448 L 678 -80 Z"
          fill="url(#jCoverL)"/>
    <!-- Left cover gold border -->
    <path d="M 238 -70 Q 220 -66 212 -54 L 212 422 Q 220 434 238 438 L 670 438 L 670 -70 Z"
          fill="none" stroke="url(#jGold)" stroke-width="2" opacity="0.6"/>

    <!-- ── RIGHT COVER (outside) ── -->
    <path d="M 1132 -80 Q 1154 -76 1164 -60 L 1164 430 Q 1154 444 1132 448 L 686 448 L 686 -80 Z"
          fill="url(#jCoverR)"/>
    <!-- Right cover gold border -->
    <path d="M 1126 -70 Q 1144 -66 1152 -54 L 1152 422 Q 1144 434 1126 438 L 694 438 L 694 -70 Z"
          fill="none" stroke="url(#jGold)" stroke-width="2" opacity="0.6"/>

    <!-- ── LEFT PAGE ── -->
    <path d="M 244 -68 L 676 -68 L 676 436 L 244 436 Q 226 432 218 418 L 218 -50 Q 226 -64 244 -68 Z"
          fill="url(#jPageL)"/>
    <!-- Left page gold edge (spine side) -->
    <rect x="670" y="-68" width="8" height="504" fill="url(#jEdgeL)" opacity="0.7"/>
    <!-- Left page outer edge lines (stacked pages effect) -->
    <line x1="248" y1="-68" x2="248" y2="436" stroke="#D4C0A0" stroke-width="0.5" opacity="0.4"/>
    <line x1="244" y1="-68" x2="244" y2="436" stroke="#C8B498" stroke-width="0.5" opacity="0.3"/>

    <!-- ── RIGHT PAGE ── -->
    <path d="M 688 -68 L 1120 -68 Q 1138 -64 1146 -50 L 1146 418 Q 1138 432 1120 436 L 688 436 Z"
          fill="url(#jPageR)"/>
    <!-- Right page gold edge (spine side) -->
    <rect x="686" y="-68" width="8" height="504" fill="url(#jEdgeR)" opacity="0.7"/>
    <!-- Right page outer edge lines -->
    <line x1="1116" y1="-68" x2="1116" y2="436" stroke="#D4C0A0" stroke-width="0.5" opacity="0.4"/>
    <line x1="1120" y1="-68" x2="1120" y2="436" stroke="#C8B498" stroke-width="0.5" opacity="0.3"/>

    <!-- ── SPINE ── -->
    <rect x="676" y="-68" width="12" height="504" fill="url(#jSpine)"/>
    <!-- Spine gold centre line -->
    <rect x="681" y="-68" width="2" height="504" fill="url(#jGold)" opacity="0.55"/>
    <!-- Spine top & bottom caps -->
    <rect x="676" y="-72" width="12" height="8" rx="1" fill="url(#jGold)" opacity="0.8"/>
    <rect x="676" y="436" width="12" height="8" rx="1" fill="url(#jGold)" opacity="0.8"/>

  </g>

  <!-- ── LEFT PAGE CONTENT — typography lines ── -->
  <!-- Chapter eyebrow -->
  <text x="682" y="22" text-anchor="end"
        font-family="'Cormorant Garamond',Georgia,serif" font-size="11"
        fill="#B68A45" letter-spacing="4" opacity="0.9">JOURNAL</text>
  <!-- Gold rule under eyebrow -->
  <line x1="248" y1="32" x2="664" y2="32" stroke="url(#jEdgeL)" stroke-width="1" opacity="0.5"/>
  <!-- Large drop cap area -->
  <text x="262" y="116" font-family="'Cormorant Garamond',Georgia,serif" font-size="80"
        fill="#2C2418" opacity="0.18">O</text>
  <!-- Paragraph lines — left column -->
  <g fill="#2C2418" opacity="0.22">
    <rect x="310" y="62"  width="340" height="8" rx="2"/>
    <rect x="262" y="78"  width="388" height="7" rx="2"/>
    <rect x="262" y="93"  width="370" height="7" rx="2"/>
    <rect x="310" y="144" width="350" height="7" rx="2"/>
    <rect x="262" y="160" width="388" height="7" rx="2"/>
    <rect x="262" y="176" width="365" height="7" rx="2"/>
    <rect x="262" y="192" width="380" height="7" rx="2"/>
    <rect x="262" y="208" width="340" height="7" rx="2"/>
    <rect x="262" y="238" width="388" height="7" rx="2"/>
    <rect x="262" y="254" width="372" height="7" rx="2"/>
    <rect x="262" y="270" width="360" height="7" rx="2"/>
    <rect x="262" y="286" width="388" height="7" rx="2"/>
    <rect x="262" y="302" width="350" height="7" rx="2"/>
    <rect x="262" y="332" width="388" height="7" rx="2"/>
    <rect x="262" y="348" width="345" height="7" rx="2"/>
    <rect x="262" y="364" width="375" height="7" rx="2"/>
    <rect x="262" y="380" width="388" height="7" rx="2"/>
    <rect x="262" y="396" width="310" height="7" rx="2"/>
  </g>
  <!-- Gold ornament divider -->
  <g transform="translate(455 220)">
    <line x1="-60" y1="0" x2="-12" y2="0" stroke="#C9A96E" stroke-width="0.8" opacity="0.45"/>
    <polygon points="0,-4 5,0 0,4 -5,0" fill="#C9A96E" opacity="0.55"/>
    <line x1="12"  y1="0" x2="60" y2="0" stroke="#C9A96E" stroke-width="0.8" opacity="0.45"/>
  </g>
  <!-- Page number left -->
  <text x="455" y="418" text-anchor="middle"
        font-family="'Cormorant Garamond',Georgia,serif" font-size="13"
        fill="#2C2418" opacity="0.35" letter-spacing="2">— 24 —</text>

  <!-- ── RIGHT PAGE CONTENT ── -->
  <!-- Chapter title area -->
  <text x="693" y="22"
        font-family="'Cormorant Garamond',Georgia,serif" font-size="28"
        fill="#2C2418" opacity="0.22" letter-spacing="1">The Edit</text>
  <line x1="698" y1="34" x2="1112" y2="34" stroke="url(#jEdgeR)" stroke-width="1" opacity="0.4"/>
  <!-- Article headline lines -->
  <rect x="698" y="52"  width="400" height="16" rx="2" fill="#2C2418" opacity="0.18"/>
  <rect x="698" y="74"  width="320" height="16" rx="2" fill="#2C2418" opacity="0.15"/>
  <line x1="698" y1="102" x2="1110" y2="102" stroke="#C9A96E" stroke-width="0.8" opacity="0.3"/>
  <!-- Image placeholder block on right page -->
  <rect x="698" y="112" width="408" height="196" rx="3"
        fill="#2C2418" opacity="0.12" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Image block label -->
  <text x="902" y="216" text-anchor="middle"
        font-family="'Cormorant Garamond',Georgia,serif" font-size="14"
        fill="#B68A45" letter-spacing="3" opacity="0.5">OLIVHAIRSUPPLY</text>
  <!-- Paragraph lines — right column -->
  <g fill="#2C2418" opacity="0.2">
    <rect x="698" y="322" width="408" height="7" rx="2"/>
    <rect x="698" y="338" width="390" height="7" rx="2"/>
    <rect x="698" y="354" width="408" height="7" rx="2"/>
    <rect x="698" y="370" width="368" height="7" rx="2"/>
    <rect x="698" y="386" width="408" height="7" rx="2"/>
    <rect x="698" y="402" width="340" height="7" rx="2"/>
  </g>
  <!-- Page number right -->
  <text x="902" y="418" text-anchor="middle"
        font-family="'Cormorant Garamond',Georgia,serif" font-size="13"
        fill="#2C2418" opacity="0.35" letter-spacing="2">— 25 —</text>

  <!-- ── BOOKMARK RIBBON ── -->
  <g opacity="0.7">
    <polygon points="682,436 688,460 694,436" fill="#B68A45"/>
    <rect x="682" y="-68" width="12" height="516" fill="#C9A96E" opacity="0.18"/>
  </g>

  <!-- ── VIGNETTES (same as wholesale) ── -->
  <rect x="-308" y="-124" width="508" height="829" fill="url(#vigL)"/>
  <rect x="1241" y="-124" width="508" height="829" fill="url(#vigR)"/>
  <rect x="-308" y="340"  width="2057" height="365" fill="url(#vigB)"/>

</svg>
