<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 580" preserveAspectRatio="xMidYMid slice" width="1440" height="580">
  <defs>
    <linearGradient id="wBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F8F8F8"/>
      <stop offset="50%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <linearGradient id="wTopS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E8E8E8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#D0D0D0" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="wKey" cx="72%" cy="14%" r="55%">
      <stop offset="0%"   stop-color="#E8E0D8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF"  stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#EBEBEB"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
    <linearGradient id="vigL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vigR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="vigB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D0D0D0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#D0D0D0" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Box black face -->
    <linearGradient id="bkFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#201C14"/>
      <stop offset="100%" stop-color="#121008"/>
    </linearGradient>
    <linearGradient id="bkTop"  x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2C2418"/>
      <stop offset="100%" stop-color="#1C1810"/>
    </linearGradient>
    <!-- Box white face -->
    <linearGradient id="whFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FCFCFA"/>
      <stop offset="100%" stop-color="#EDE8E0"/>
    </linearGradient>
    <linearGradient id="whTop"  x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0ECE6"/>
    </linearGradient>

    <!-- Gold text gradient -->
    <linearGradient id="goldT" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#B8900A"/>
      <stop offset="50%"  stop-color="#E8C858"/>
      <stop offset="100%" stop-color="#C09828"/>
    </linearGradient>

    <!-- Hair -->
    <linearGradient id="hDark" x1="0.1" y1="0" x2="0.1" y2="1">
      <stop offset="0%"   stop-color="#180E04"/>
      <stop offset="40%"  stop-color="#281808"/>
      <stop offset="100%" stop-color="#1C1008"/>
    </linearGradient>
    <linearGradient id="hShine" x1="0.08" y1="0" x2="0.2" y2="1">
      <stop offset="0%"   stop-color="#C09050" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#D8A860" stop-opacity="0.68"/>
      <stop offset="60%"  stop-color="#B08040" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#885020" stop-opacity="0"/>
    </linearGradient>

    <!-- Scissors -->
    <linearGradient id="bladeSc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#9898A4"/>
      <stop offset="35%"  stop-color="#D8D8E0"/>
      <stop offset="55%"  stop-color="#ECEEF4"/>
      <stop offset="85%"  stop-color="#C0C0C8"/>
      <stop offset="100%" stop-color="#888890"/>
    </linearGradient>
    <linearGradient id="hndlSc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D8AC3A"/>
      <stop offset="50%"  stop-color="#E4BA48"/>
      <stop offset="100%" stop-color="#A47818"/>
    </linearGradient>
    <radialGradient id="pvtSc" cx="45%" cy="38%" r="55%">
      <stop offset="0%"   stop-color="#F0D870"/>
      <stop offset="50%"  stop-color="#D4A840"/>
      <stop offset="100%" stop-color="#A47818"/>
    </radialGradient>

    <!-- Comb -->
    <linearGradient id="combH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C1810"/>
      <stop offset="100%" stop-color="#0E0C08"/>
    </linearGradient>
  </defs>

  <!-- BACKDROP -->
  <rect width="1440" height="580" fill="url(#wBg)"/>
  <rect width="1440" height="580" fill="url(#wTopS)"/>
  <rect width="1440" height="580" fill="url(#wKey)"/>

  <!-- FLOOR -->
  <rect x="0" y="448" width="1440" height="132" fill="url(#wFloor)"/>
  <rect x="0" y="445" width="1440" height="5"   fill="#C8C8C8" opacity="0.5"/>

  <!-- ══════════════ HAIR — BEHIND BOXES ══════════════ -->
  <path d="M666,40 Q652,130 640,225 Q626,330 635,415 Q640,462 633,508 Q627,545 620,578" fill="none" stroke="url(#hDark)" stroke-width="24" opacity="0.88" stroke-linecap="round"/>
  <path d="M682,36 Q674,128 670,224 Q664,330 670,416 Q674,463 668,510 Q662,548 655,578" fill="none" stroke="url(#hDark)" stroke-width="19" opacity="0.82" stroke-linecap="round"/>
  <path d="M698,38 Q694,130 692,228 Q688,335 694,420 Q697,466 693,512 Q688,548 682,578" fill="none" stroke="url(#hDark)" stroke-width="16" opacity="0.77" stroke-linecap="round"/>
  <path d="M714,36 Q712,128 712,228 Q712,335 715,420 Q717,465 714,510 Q710,548 705,578" fill="none" stroke="url(#hDark)" stroke-width="14" opacity="0.72" stroke-linecap="round"/>
  <path d="M650,44 Q634,134 622,228 Q608,334 618,415 Q624,462 616,508" fill="none" stroke="#180E04" stroke-width="11" opacity="0.65" stroke-linecap="round"/>
  <path d="M730,42 Q730,132 732,228 Q734,334 730,416 Q728,463 728,510" fill="none" stroke="#180E04" stroke-width="10" opacity="0.62" stroke-linecap="round"/>
  <!-- shine threads -->
  <path d="M672,42 Q658,136 648,232 Q636,338 645,420 Q649,466 642,512" fill="none" stroke="url(#hShine)" stroke-width="9"  opacity="0.52" stroke-linecap="round"/>
  <path d="M706,40 Q703,134 702,230 Q699,336 704,418 Q707,464 704,510" fill="none" stroke="url(#hShine)" stroke-width="7"  opacity="0.45" stroke-linecap="round"/>
  <path d="M690,38 Q688,130 688,226 Q688,333 691,417" fill="none" stroke="#E0B868" stroke-width="2"   opacity="0.2"  stroke-linecap="round"/>
  <path d="M678,40 Q665,132 658,226 Q650,330 658,414" fill="none" stroke="#D4A858" stroke-width="1.5" opacity="0.18" stroke-linecap="round"/>

  <!-- ══════════════ BOX STACK  rotate(-10° around canvas 680,345) ══════════════ -->
  <g transform="rotate(-10, 680, 345)">

    <!-- ── BOTTOM BOX (BIG: 260×100 black) ── -->
    <ellipse cx="695" cy="455" rx="152" ry="7.5" fill="#060402" opacity="0.45"/>
    <!-- right side -->
    <rect x="810" y="344" width="20" height="102" fill="#0C0A08" opacity="0.9"/>
    <!-- top edge -->
    <rect x="550" y="335" width="260" height="9"   fill="url(#bkTop)"/>
    <rect x="810" y="335" width="20"  height="9"   fill="#0A0808"/>
    <!-- front face -->
    <rect x="550" y="344" width="260" height="102" fill="url(#bkFace)"/>
    <!-- rules -->
    <line x1="552" y1="367" x2="808" y2="367" stroke="#C9A96E" stroke-width="0.7" opacity="0.45"/>
    <line x1="552" y1="424" x2="808" y2="424" stroke="#C9A96E" stroke-width="0.7" opacity="0.45"/>
    <!-- brand -->
    <text x="680" y="387" font-family="'Cormorant Garamond',Georgia,serif" font-size="23" font-weight="300" fill="url(#goldT)" text-anchor="middle" letter-spacing="5" opacity="0.96">OLIVHAIRSUPPLY</text>
    <text x="680" y="415" font-family="'Cormorant Garamond',Georgia,serif" font-size="8"  font-style="italic" fill="#C9A96E" text-anchor="middle" letter-spacing="4" opacity="0.85">Berlin · Premium Hair</text>

    <!-- ── MIDDLE BOX (SMALL: 180×78 white) ── -->
    <!-- right side -->
    <rect x="770" y="266" width="16" height="78" fill="#C8C4BC" opacity="0.9"/>
    <!-- top edge -->
    <rect x="590" y="258" width="180" height="8"  fill="url(#whTop)"/>
    <rect x="770" y="258" width="16"  height="8"  fill="#D8D4CE"/>
    <!-- front face -->
    <rect x="590" y="266" width="180" height="78" fill="url(#whFace)" stroke="#D8D0C8" stroke-width="0.8"/>
    <!-- gold rules -->
    <line x1="592" y1="288" x2="768" y2="288" stroke="#C9A96E" stroke-width="0.6" opacity="0.5"/>
    <line x1="592" y1="328" x2="768" y2="328" stroke="#C9A96E" stroke-width="0.6" opacity="0.5"/>
    <!-- text -->
    <text x="680" y="303" font-family="'Montserrat',sans-serif" font-size="10"  font-weight="700" fill="#1A1410" text-anchor="middle" letter-spacing="3.5" opacity="0.88">BIZILUXE</text>
    <text x="680" y="321" font-family="'Montserrat',sans-serif" font-size="8.5" font-weight="500" fill="#4A3C30" text-anchor="middle" letter-spacing="3"   opacity="0.78">EXTENSIONS</text>

    <!-- ── TOP BOX (BIGGEST: 290×98 black) ── -->
    <!-- right side -->
    <rect x="825" y="160" width="22" height="98" fill="#0C0A08" opacity="0.9"/>
    <!-- top edge -->
    <rect x="535" y="151" width="290" height="9"  fill="url(#bkTop)"/>
    <rect x="825" y="151" width="22"  height="9"  fill="#0A0808"/>
    <!-- front face -->
    <rect x="535" y="160" width="290" height="98" fill="url(#bkFace)"/>
    <!-- rules -->
    <line x1="537" y1="183" x2="823" y2="183" stroke="#C9A96E" stroke-width="0.7" opacity="0.4"/>
    <line x1="537" y1="244" x2="823" y2="244" stroke="#C9A96E" stroke-width="0.7" opacity="0.4"/>
    <!-- website — domain smaller, path BIG & bold -->
    <text x="680" y="206" font-family="'Montserrat',sans-serif" font-size="11"  font-weight="400" fill="#C8C4BC" text-anchor="middle" letter-spacing="1.5" opacity="0.72">www.olivhairsupply.de</text>
    <text x="680" y="236" font-family="'Montserrat',sans-serif" font-size="19"  font-weight="700" fill="#FFFFFF"  text-anchor="middle" letter-spacing="2"   opacity="0.97">/wholesale</text>

  </g>
  <!-- ══════════════ END BOX STACK ══════════════ -->

  <!-- ══════════════ HAIR — FOREGROUND STRANDS ══════════════ -->
  <path d="M660,38 Q644,132 632,226 Q618,332 628,412 Q633,460 626,506 Q621,544 615,576" fill="none" stroke="#241408" stroke-width="7"  opacity="0.48" stroke-linecap="round"/>
  <path d="M746,42 Q750,136 752,232 Q754,338 750,416 Q747,462 750,508" fill="none" stroke="#1A1008" stroke-width="6"  opacity="0.45" stroke-linecap="round"/>
  <path d="M674,42 Q659,136 648,232 Q636,336 643,416" fill="none" stroke="#D4A858" stroke-width="1.5" opacity="0.18" stroke-linecap="round"/>

  <!-- ══════════════ LEFT: TINY BOX + SCISSORS ══════════════ -->
  <!-- Tiny display box -->
  <rect x="490" y="388" width="52" height="60" rx="1" fill="url(#bkFace)"/>
  <!-- top edge -->
  <rect x="490" y="382" width="52" height="6"  fill="url(#bkTop)"/>
  <!-- right side -->
  <rect x="542" y="388" width="10" height="60" fill="#0C0A08" opacity="0.9"/>
  <rect x="542" y="382" width="10" height="6"  fill="#0A0808"/>
  <!-- BL on box -->
  <text x="516" y="424" font-family="'Cormorant Garamond',Georgia,serif" font-size="10" fill="#C9A96E" text-anchor="middle" font-style="italic" opacity="0.8">BL</text>
  <!-- box shadow -->
  <ellipse cx="518" cy="452" rx="34" ry="4" fill="#060402" opacity="0.42"/>

  <!-- Scissors beside/on box -->
  <g transform="translate(516,348) rotate(-14)">
    <!-- blade A -->
    <path d="M-3.5,0 L-4,108 Q-0.5,114 3.5,108 L4,0 Q0.5,-5.5 -3.5,0 Z" fill="url(#bladeSc)" opacity="0.94"/>
    <line x1="-1.5" y1="5" x2="-2" y2="102" stroke="#F0F0F8" stroke-width="0.7" opacity="0.5"/>
    <!-- blade B -->
    <path d="M9,0 L8.5,108 Q12,114 15.5,108 L16,0 Q12.5,-5.5 9,0 Z" fill="url(#bladeSc)" opacity="0.86"/>
    <!-- pivot -->
    <circle cx="6" cy="0" r="8.5" fill="url(#pvtSc)"/>
    <circle cx="6" cy="0" r="5"   fill="#C89C28"/>
    <circle cx="6" cy="0" r="2"   fill="#F0D870"/>
    <!-- handle A lower loop -->
    <path d="M-4,108 Q-16,133 -9,156 Q-3,172 6,166 Q15,156 13,132 Q11,114 4,108 Z" fill="url(#hndlSc)"/>
    <path d="M-2,113 Q-13,135 -8,154 Q-2,167 5,162 Q13,153 11,132 Q10,116 3,113 Z" fill="#1A1608" opacity="0.83"/>
    <!-- handle B upper loop -->
    <path d="M4,108 Q18,116 23,106 Q29,94 22,82 Q14,74 4,82 Q-2,91 -2,101 Z" fill="url(#hndlSc)"/>
    <path d="M5.5,104 Q16,111 20,103 Q25,93 19,83 Q12,77 5.5,83 Q0.5,91 0.5,100 Z" fill="#1A1608" opacity="0.83"/>
  </g>

  <!-- ══════════════ RIGHT: COMB + BIZILUXE ══════════════ -->
  <g transform="translate(878,302) rotate(6)" opacity="0.92">
    <!-- handle -->
    <path d="M-9,22 Q-11,118 -8,148 Q-4,160 0,160 Q4,160 8,148 Q11,118 9,22 Q4,9 0,7 Q-4,9 -9,22 Z" fill="url(#combH)"/>
    <!-- gold ferrule -->
    <rect x="-8" y="138" width="16" height="11" rx="1" fill="#C9A030" opacity="0.85"/>
    <!-- spine top -->
    <rect x="-11" y="-56" width="22" height="78" rx="5" fill="#242018"/>
    <!-- spine shine edge -->
    <line x1="-4" y1="-54" x2="-4" y2="20" stroke="#3A3228" stroke-width="1" opacity="0.6"/>
    <!-- wide teeth (left) -->
    <g stroke="#888070" stroke-width="2.4" stroke-linecap="round">
      <line x1="-21" y1="-40" x2="-11" y2="-40"/>
      <line x1="-22" y1="-28" x2="-11" y2="-28"/>
      <line x1="-22" y1="-16" x2="-11" y2="-16"/>
      <line x1="-22" y1="-4"  x2="-11" y2="-4"/>
      <line x1="-21" y1="8"   x2="-11" y2="8"/>
    </g>
    <!-- fine teeth (right) -->
    <g stroke="#706858" stroke-width="1.1" stroke-linecap="round">
      <line x1="11" y1="-46" x2="22" y2="-46"/>
      <line x1="11" y1="-39" x2="22" y2="-39"/>
      <line x1="11" y1="-32" x2="22" y2="-32"/>
      <line x1="11" y1="-25" x2="22" y2="-25"/>
      <line x1="11" y1="-18" x2="22" y2="-18"/>
      <line x1="11" y1="-11" x2="22" y2="-11"/>
      <line x1="11" y1="-4"  x2="22" y2="-4"/>
      <line x1="11" y1="3"   x2="22" y2="3"/>
      <line x1="11" y1="10"  x2="22" y2="10"/>
    </g>
    <!-- BIZILUXE tag below ferrule -->
    <text x="0" y="85" font-family="'Cormorant Garamond',Georgia,serif" font-size="8" font-style="italic" fill="#C9A96E" text-anchor="middle" letter-spacing="2.5" opacity="0.88" transform="rotate(-6)">BIZILUXE</text>
    <!-- comb shadow -->
    <ellipse cx="0" cy="165" rx="18" ry="3.5" fill="#060402" opacity="0.35"/>
  </g>

  <!-- MAIN STACK FLOOR SHADOW -->
  <ellipse cx="690" cy="456" rx="165" ry="7" fill="#060402" opacity="0.36"/>

  <!-- VIGNETTES -->
  <rect x="0"    y="0"   width="200"  height="580" fill="url(#vigL)"/>
  <rect x="1240" y="0"   width="200"  height="580" fill="url(#vigR)"/>
  <rect x="0"    y="370" width="1440" height="210" fill="url(#vigB)"/>
</svg>
