  <rect x="1290" y="110" width="26" height="70" rx="6" fill="#2A2820"/>
  <rect x="1295" y="100" width="16" height="14" rx="4" fill="#2A2820"/>
  <rect x="1300" y="90"  width="6"  height="12" rx="2" fill="#3A3830"/>
