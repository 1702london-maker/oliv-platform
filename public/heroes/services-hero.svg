  <line x1="540" y1="517" x2="1440" y2="517" stroke="#C9A96E" stroke-width="1.5" opacity="0.18"/>

  <!-- Small wall mirror above shelf (right) -->
  <rect x="1285" y="-60" width="148" height="160" rx="8" fill="#201C14" opacity="0.55"/>
  <rect x="1281" y="-64" width="156" height="168" rx="10" fill="none" stroke="#C9A96E" stroke-width="3" opacity="0.70"/>
  <rect x="1283" y="-62" width="152" height="3" fill="#C9A96E" opacity="0.30"/>

  <!-- ── VIGNETTES — exact wholesale ── -->
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#vigL)"/>
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#vigR)"/>
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#vigT)"/>
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#vigB)"/>

  </g>
</svg>
