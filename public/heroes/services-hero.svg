  <line x1="540" y1="80"  x2="1440" y2="80"  stroke="#3A3830" stroke-width="1.2" opacity="0.45"/>
  <line x1="540" y1="160" x2="1440" y2="160" stroke="#3A3830" stroke-width="1.2" opacity="0.45"/>
  <line x1="540" y1="240" x2="1440" y2="240" stroke="#3A3830" stroke-width="1.2" opacity="0.45"/>
  <line x1="540" y1="320" x2="1440" y2="320" stroke="#3A3830" stroke-width="1.2" opacity="0.45"/>
  <line x1="540" y1="400" x2="1440" y2="400" stroke="#3A3830" stroke-width="1.2" opacity="0.45"/>
  <!-- Vertical grout -->
