  <circle cx="820" cy="290" r="22" fill="#FFFFFF" opacity="0.18"/>
  <circle cx="848" cy="278" r="16" fill="#FFFFFF" opacity="0.14"/>
  <circle cx="800" cy="278" r="14" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="856" cy="298" r="12" fill="#FFFFFF" opacity="0.13"/>
  <circle cx="836" cy="264" r="10" fill="#FFFFFF" opacity="0.10"/>
