  <line x1="780"  y1="-124" x2="780"  y2="480" stroke="#3A3830" stroke-width="1"   opacity="0.35"/>
  <line x1="940"  y1="-124" x2="940"  y2="480" stroke="#3A3830" stroke-width="1"   opacity="0.35"/>
  <line x1="1100" y1="-124" x2="1100" y2="480" stroke="#3A3830" stroke-width="1"   opacity="0.35"/>
  <line x1="1260" y1="-124" x2="1260" y2="480" stroke="#3A3830" stroke-width="1"   opacity="0.35"/>
  <line x1="1420" y1="-124" x2="1420" y2="480" stroke="#3A3830" stroke-width="1"   opacity="0.35"/>

