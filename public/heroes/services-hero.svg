    <rect x="1088" y="230" width="7" height="72" rx="2.5" fill="url(#combG)" transform="rotate(-28 1091 266)"/>
    <!-- Comb teeth -->
    <path d="M1080 248 L1075 263 M1086 242 L1082 257 M1092 237 L1088 252 M1098 232 L1094 247 M1104 228 L1100 243 M1110 225 L1106 240 M1116 222 L1112 237"
