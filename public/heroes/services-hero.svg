  <rect x="1280" y="180" width="160" height="10" rx="3" fill="#C9A96E"/>
  <rect x="1280" y="188" width="160" height="4"  rx="1" fill="#A88A4E"/>
  <!-- Bottles on shelf — flat cartoon style -->
