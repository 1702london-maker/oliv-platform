<svg xmlns="http://www.w3.org/2000/svg" viewBox="-308 -124 2057 829" preserveAspectRatio="xMidYMid slice" width="1440" height="580">
  <defs>
    <!-- Exact wholesale background palette -->
    <linearGradient id="sBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#424040"/>
      <stop offset="28%"  stop-color="#555250"/>
      <stop offset="54%"  stop-color="#5E5A56"/>
      <stop offset="78%"  stop-color="#575350"/>
      <stop offset="100%" stop-color="#4A4744"/>
    </linearGradient>
    <linearGradient id="sTopS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C1810" stop-opacity="0.52"/>
      <stop offset="38%"  stop-color="#1C1810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#100C08" stop-opacity="0.38"/>
    </linearGradient>
    <radialGradient id="sKey" cx="72%" cy="14%" r="55%">
      <stop offset="0%"   stop-color="#807060" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#5E5A56" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#363230"/>
      <stop offset="100%" stop-color="#242018"/>
    </linearGradient>
    <!-- Hair — rich dark brown, exact wholesale hair palette -->
    <linearGradient id="hDark" x1="0.1" y1="0" x2="0.1" y2="1">
      <stop offset="0%"   stop-color="#180E04"/>
      <stop offset="40%"  stop-color="#281808"/>
      <stop offset="100%" stop-color="#1C1008"/>
    </linearGradient>
    <linearGradient id="hShine" x1="0.08" y1="0" x2="0.2" y2="1">
      <stop offset="0%"   stop-color="#C09050" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#D8A860" stop-opacity="0.65"/>
      <stop offset="60%"  stop-color="#B08040" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#885020" stop-opacity="0"/>
    </linearGradient>
    <!-- Skin — same warm mid-tone as wholesale figures -->
    <linearGradient id="skinG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C8926A"/>
      <stop offset="100%" stop-color="#9A6840"/>
    </linearGradient>
    <!-- Dress / garment dark -->
    <linearGradient id="dressG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#201C14"/>
      <stop offset="100%" stop-color="#121008"/>
    </linearGradient>
    <!-- Mirror frame gold -->
    <linearGradient id="frameG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8A7A5A"/>
      <stop offset="100%" stop-color="#5A4A30"/>
    </linearGradient>
    <!-- Gold accent (brand #C9A96E) -->
    <linearGradient id="goldT" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#B8900A"/>
      <stop offset="50%"  stop-color="#E8C858"/>
      <stop offset="100%" stop-color="#C09828"/>
    </linearGradient>
    <!-- Comb metal -->
    <linearGradient id="combG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#9898A4"/>
      <stop offset="40%"  stop-color="#D8D8E0"/>
      <stop offset="70%"  stop-color="#C0C0C8"/>
      <stop offset="100%" stop-color="#888890"/>
    </linearGradient>
    <!-- Exact wholesale vignettes -->
    <linearGradient id="vigL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vigR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0.35"/>
