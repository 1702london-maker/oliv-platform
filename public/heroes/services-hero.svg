  <rect x="1055" y="400" width="54" height="110" rx="10" fill="#2A2620"/>
  <!-- Shoes -->
  <ellipse cx="1002" cy="516" rx="34" ry="12" fill="#1A1610"/>
  <ellipse cx="1082" cy="516" rx="34" ry="12" fill="#1A1610"/>
