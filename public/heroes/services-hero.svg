  <rect x="1326" y="118" width="24" height="62" rx="5" fill="#C9A96E"/>
  <rect x="1329" y="108" width="18" height="12" rx="4" fill="#B89A5A"/>
  <rect x="1334" y="98"  width="8"  height="12" rx="2" fill="#A88A4A"/>
  <rect x="1327" y="138" width="22" height="6"  rx="2" fill="#FFFFFF" opacity="0.25"/>
  <!-- Bottle 3: cream/white bottle -->
  <rect x="1360" y="114" width="22" height="66" rx="5" fill="#E8E2D8"/>
  <rect x="1362" y="104" width="18" height="12" rx="4" fill="#D4CEC4"/>
  <rect x="1367" y="94"  width="8"  height="12" rx="2" fill="#C4BEB4"/>
  <rect x="1361" y="134" width="20" height="6"  rx="2" fill="#C9A96E" opacity="0.6"/>
  <!-- Bottle 4: small dark -->
  <rect x="1392" y="126" width="20" height="54" rx="5" fill="#3A3430"/>
  <rect x="1394" y="116" width="16" height="12" rx="4" fill="#2A2A26"/>
  <rect x="1398" y="107" width="8"  height="11" rx="2" fill="#2A2A26"/>

