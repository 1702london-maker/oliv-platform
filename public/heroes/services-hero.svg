  <rect x="1025" y="158" width="30" height="4" rx="1" fill="#FFFFFF" opacity="0.5"/>
  <rect x="1025" y="166" width="22" height="3" rx="1" fill="#FFFFFF" opacity="0.35"/>
  <!-- Stylist neck -->
  <rect x="1024" y="88" width="36" height="40" rx="12" fill="#D4956A"/>
  <!-- Stylist head — round, cartoon style -->
  <ellipse cx="1042" cy="60" rx="54" ry="56" fill="#D4956A"/>
  <!-- Head outline subtle -->
  <ellipse cx="1042" cy="60" rx="54" ry="56" fill="none" stroke="#B87848" stroke-width="1.5" opacity="0.25"/>
  <!-- Stylist hair — bun / updo, flat dark shape -->
  <path d="M990 36 Q985 10 993 -10 Q1004 -30 1022 -38 Q1038 -44 1054 -40 Q1072 -34 1080 -18 Q1090 2 1088 28 Q1076 18 1058 14 Q1042 10 1026 14 Q1010 20 990 36 Z" fill="#281808"/>
  <!-- Bun knot at back top -->
  <circle cx="1074" cy="8" r="20" fill="#201408"/>
  <circle cx="1074" cy="8" r="14" fill="#281808"/>
  <!-- Bun highlight -->
  <path d="M1064 0 Q1074 -4 1084 2" stroke="#5A3C18" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Ear (left) -->
  <ellipse cx="990" cy="62" rx="10" ry="14" fill="#C48858"/>
  <ellipse cx="990" cy="62" rx="6"  ry="9"  fill="#B87848" opacity="0.5"/>
  <!-- Earring -->
  <circle cx="990" cy="74" r="4" fill="#C9A96E"/>
  <!-- Stylist face — calm, focused downward look -->
