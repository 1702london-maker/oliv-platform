  <path d="M834 224 Q845 218 858 222" stroke="#2A1808" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Soft smile -->
  <path d="M810 266 Q829 273 848 267" stroke="#A87040" stroke-width="2.2" fill="none" stroke-linecap="round"/>
