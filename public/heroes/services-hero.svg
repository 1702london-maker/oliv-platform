  <path d="M700 218 Q695 195 700 175 Q705 155 720 148 L1040 148 Q1055 155 1060 175 Q1065 195 1060 218 L700 218 Z" fill="#D4CEC4" stroke="#B8B2A8" stroke-width="2"/>
  <!-- Basin inner bowl -->
