  <path d="M798 238 Q808 232 820 236" stroke="#3A2010" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M836 232 Q847 226 858 230" stroke="#3A2010" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- Eyebrow hints -->
