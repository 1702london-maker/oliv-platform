    <!-- Fingers lifted into hair -->
    <path d="M1068 294 Q1062 306 1066 318 Q1070 324 1078 322" stroke="#A87040" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <path d="M1076 302 Q1073 315 1077 326" stroke="#A87040" stroke-width="5"   fill="none" stroke-linecap="round"/>
    <path d="M1086 306 Q1084 318 1088 330" stroke="#A87040" stroke-width="5"   fill="none" stroke-linecap="round"/>
    <path d="M1094 303 Q1094 315 1100 325" stroke="#A87040" stroke-width="4.5" fill="none" stroke-linecap="round"/>

