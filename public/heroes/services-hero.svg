<svg xmlns="http://www.w3.org/2000/svg" viewBox="-308 -124 2057 829" preserveAspectRatio="xMidYMid slice" width="1440" height="580">
  <defs>
    <!-- Wholesale exact background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#424040"/>
      <stop offset="28%"  stop-color="#555250"/>
      <stop offset="54%"  stop-color="#5E5A56"/>
      <stop offset="78%"  stop-color="#575350"/>
      <stop offset="100%" stop-color="#4A4744"/>
    </linearGradient>
    <linearGradient id="topS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C1810" stop-opacity="0.52"/>
      <stop offset="38%"  stop-color="#1C1810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#100C08" stop-opacity="0.38"/>
    </linearGradient>
    <radialGradient id="keyL" cx="72%" cy="14%" r="55%">
      <stop offset="0%"   stop-color="#807060" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#5E5A56" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#363230"/>
      <stop offset="100%" stop-color="#242018"/>
    </linearGradient>
    <!-- Wholesale vignettes exact -->
    <linearGradient id="vigL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vigR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="vigB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D0D0D0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#D0D0D0" stop-opacity="0.30"/>
    </linearGradient>
    <linearGradient id="vigT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C1810" stop-opacity="0.42"/>
      <stop offset="28%"  stop-color="#1C1810" stop-opacity="0"/>
    </linearGradient>
    <!-- Tile wall gradient -->
    <linearGradient id="wallT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6A6460" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4A4440" stop-opacity="0.20"/>
    </linearGradient>
    <!-- Basin porcelain -->
    <linearGradient id="basin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E8E4DC"/>
      <stop offset="100%" stop-color="#C8C2B6"/>
    </linearGradient>
    <!-- Chair upholstery -->
    <linearGradient id="chair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3A2E20"/>
      <stop offset="100%" stop-color="#241C12"/>
    </linearGradient>
    <filter id="dropshadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0C0A06" flood-opacity="0.45"/>
    </filter>
    <clipPath id="sc">
      <rect x="-308" y="-124" width="2057" height="829"/>
    </clipPath>
  </defs>

