    <!-- ── PRODUCT SHELF right wall ── -->
    <rect x="1290" y="215" width="165" height="10" rx="2" fill="#3A3020" opacity="0.88"/>
    <rect x="1290" y="225" width="165" height="3"  fill="#2A2015" opacity="0.65"/>
    <rect x="1300" y="170" width="20" height="45" rx="5" fill="#9A8A72" opacity="0.9"/>
    <rect x="1300" y="170" width="20" height="11" rx="3" fill="#7A6A52"/>
    <rect x="1304" y="157" width="12" height="15" rx="3" fill="#8A7A62"/>
    <rect x="1328" y="178" width="18" height="37" rx="4" fill="#C9A96E" opacity="0.85"/>
    <rect x="1328" y="178" width="18" height="10" rx="3" fill="#A88A4E"/>
    <rect x="1332" y="166" width="10" height="14" rx="3" fill="#B89A5E"/>
    <rect x="1354" y="174" width="22" height="41" rx="5" fill="#787060" opacity="0.88"/>
    <rect x="1354" y="174" width="22" height="11" rx="3" fill="#585040"/>
    <rect x="1359" y="160" width="12" height="16" rx="3" fill="#686050"/>
    <rect x="1384" y="182" width="15" height="33" rx="4" fill="#D8CCBA" opacity="0.72"/>
    <rect x="1386" y="170" width="11" height="14" rx="3" fill="#C8BCAA"/>

    <!-- ── VIGNETTES — exact wholesale values ── -->
    <rect x="-308" y="-124" width="2057" height="829" fill="url(#vigL)"/>
    <rect x="-308" y="-124" width="2057" height="829" fill="url(#vigR)"/>
    <rect x="-308" y="-124" width="2057" height="829" fill="url(#vigT)"/>
    <rect x="-308" y="-124" width="2057" height="829" fill="url(#vigB)"/>

