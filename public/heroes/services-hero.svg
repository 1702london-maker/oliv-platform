  <path d="M680 310 Q675 280 680 250 Q685 225 700 218 L1000 218 Q1014 225 1018 250 Q1022 278 1016 310 Q1014 340 1000 360 L700 360 Q686 342 680 310 Z" fill="url(#chair)" rx="10"/>
