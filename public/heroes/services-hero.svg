    <path d="M884 56 Q868 130 866 230 Q864 330 868 440" stroke="#D8A860" stroke-width="1.5" fill="none" opacity="0.10" stroke-linecap="round"/>
    <path d="M928 40 Q920 130 918 250 Q916 370 920 490"  stroke="#D8A860" stroke-width="2"   fill="none" opacity="0.09" stroke-linecap="round"/>
    <path d="M972 56 Q988 130 990 230 Q992 330 988 440" stroke="#D8A860" stroke-width="1.5" fill="none" opacity="0.10" stroke-linecap="round"/>

