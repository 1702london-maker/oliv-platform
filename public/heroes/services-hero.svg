  <ellipse cx="1062" cy="50" rx="9" ry="10" fill="#FFFFFF"/>
  <ellipse cx="1022" cy="54" rx="6" ry="7"  fill="#3A2010"/>
  <ellipse cx="1064" cy="52" rx="6" ry="7"  fill="#3A2010"/>
  <ellipse cx="1024" cy="55" rx="3" ry="3.5" fill="#1A0E08"/>
  <ellipse cx="1066" cy="53" rx="3" ry="3.5" fill="#1A0E08"/>
  <!-- Eye shine -->
  <circle cx="1026" cy="52" r="2" fill="#FFFFFF"/>
  <circle cx="1068" cy="50" r="2" fill="#FFFFFF"/>
  <!-- Eyelashes top -->
  <path d="M1012 44 Q1020 38 1030 42" stroke="#1A0E08" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M1054 42 Q1062 36 1072 40" stroke="#1A0E08" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Eyebrows — slightly furrowed in concentration -->
  <path d="M1009 38 Q1019 32 1032 36" stroke="#281808" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M1052 36 Q1062 30 1075 34" stroke="#281808" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M1034 68 Q1042 76 1050 74 Q1054 72 1056 68" stroke="#A87040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="1036" cy="68" rx="4" ry="3" fill="#B87040" opacity="0.35"/>
  <ellipse cx="1052" cy="68" rx="4" ry="3" fill="#B87040" opacity="0.35"/>
  <!-- Gentle smile -->
  <path d="M1024 82 Q1042 92 1060 84" stroke="#A87040" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <ellipse cx="1008" cy="76" rx="12" ry="7" fill="#E8927A" opacity="0.28"/>
  <ellipse cx="1076" cy="74" rx="12" ry="7" fill="#E8927A" opacity="0.28"/>

  <!-- ── STYLIST ARMS — reaching forward into client's hair ── -->
  <!-- Left arm (towards basin) -->
  <path d="M960 228 Q938 248 920 278 Q904 306 898 332 Q894 350 900 362" stroke="#D4956A" stroke-width="34" stroke-linecap="round" fill="none"/>
  <!-- Left hand -->
  <ellipse cx="900" cy="365" rx="22" ry="16" fill="#D4956A" transform="rotate(-30 900 365)"/>
  <!-- Fingers (flat cartoon) -->
  <path d="M886 358 Q880 348 884 340 Q888 334 894 338" stroke="#C48858" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M892 368 Q886 378 882 374 Q878 370 880 364" stroke="#C48858" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M904 374 Q900 384 896 382" stroke="#C48858" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Right arm (towards basin from other side) -->
  <path d="M1126 228 Q1146 248 1160 278 Q1174 306 1176 334 Q1178 352 1170 362" stroke="#D4956A" stroke-width="34" stroke-linecap="round" fill="none"/>
  <!-- Right hand -->
  <ellipse cx="1168" cy="366" rx="22" ry="16" fill="#D4956A" transform="rotate(30 1168 366)"/>
  <!-- Fingers -->
  <path d="M1180 358 Q1186 348 1182 340 Q1178 334 1172 338" stroke="#C48858" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M1176 368 Q1182 378 1186 374 Q1190 370 1188 364" stroke="#C48858" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M1164 374 Q1168 384 1172 382" stroke="#C48858" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- ── DECORATIVE ELEMENTS ── -->
  <!-- Gold accent stripe on basin rim -->
  <path d="M700 148 L1060 148" stroke="#C9A96E" stroke-width="3" opacity="0.55"/>

