<svg xmlns="http://www.w3.org/2000/svg" viewBox="-308 -124 2057 829" preserveAspectRatio="xMidYMid slice" width="1440" height="580">
  <defs>
    <!-- Studio backdrop — exact appointments palette -->
    <linearGradient id="sBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#424040"/>
      <stop offset="28%"  stop-color="#555250"/>
      <stop offset="54%"  stop-color="#5E5A56"/>
      <stop offset="78%"  stop-color="#575350"/>
      <stop offset="100%" stop-color="#4A4744"/>
    </linearGradient>
    <linearGradient id="sTopS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C1810" stop-opacity="0.52"/>
      <stop offset="38%"  stop-color="#1C1810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#100C08" stop-opacity="0.38"/>
    </linearGradient>
    <radialGradient id="sKey" cx="72%" cy="14%" r="55%">
      <stop offset="0%"   stop-color="#807060" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#5E5A56" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#363230"/>
      <stop offset="100%" stop-color="#242018"/>
    </linearGradient>
    <!-- Vignettes -->
    <linearGradient id="svigL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="svigR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="svigB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D0D0D0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#D0D0D0" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Gold -->
    <linearGradient id="sGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#A07818"/>
      <stop offset="25%"  stop-color="#D4B060"/>
      <stop offset="50%"  stop-color="#E8C870"/>
      <stop offset="75%"  stop-color="#C9A040"/>
      <stop offset="100%" stop-color="#9A7018"/>
    </linearGradient>
    <linearGradient id="sGoldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#A07818"/>
      <stop offset="40%"  stop-color="#C9A96E"/>
      <stop offset="70%"  stop-color="#D4B478"/>
      <stop offset="100%" stop-color="#9A7018"/>
    </linearGradient>
    <linearGradient id="sGoldT" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#B8900A"/>
      <stop offset="50%"  stop-color="#E8C858"/>
      <stop offset="100%" stop-color="#C09828"/>
    </linearGradient>

    <!-- Mirror -->
    <linearGradient id="sMirFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#A07818"/>
      <stop offset="25%"  stop-color="#D4B060"/>
      <stop offset="50%"  stop-color="#E8C870"/>
      <stop offset="75%"  stop-color="#C9A040"/>
      <stop offset="100%" stop-color="#9A7018"/>
    </linearGradient>
    <linearGradient id="sMirSurf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6E6A66" stop-opacity="0.68"/>
      <stop offset="50%"  stop-color="#7A7672" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#5A5652" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="sMirSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="22%"  stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="55%"  stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Box / packaging -->
    <linearGradient id="sBoxFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#201C14"/>
      <stop offset="100%" stop-color="#121008"/>
    </linearGradient>
    <linearGradient id="sBoxSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#171410"/>
      <stop offset="100%" stop-color="#0E0C08"/>
    </linearGradient>
    <linearGradient id="sBoxTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2C2418"/>
      <stop offset="100%" stop-color="#1C1810"/>
    </linearGradient>
    <linearGradient id="sShelf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2E2A26"/>
      <stop offset="100%" stop-color="#1A1614"/>
    </linearGradient>

    <filter id="sSb"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="sMb"><feGaussianBlur stdDeviation="1.8"/></filter>
  </defs>

  <!-- ─── BACKDROP ─── -->
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#sBg)"/>
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#sTopS)"/>
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#sKey)"/>
  <rect x="-308" y="448"  width="2057" height="257" fill="url(#sFloor)"/>
  <rect x="-308" y="445"  width="2057" height="5"   fill="#14100C" opacity="0.38"/>

  <!-- ══════════════════════════════════════
       LARGE SALON MIRROR — centre x:682
       (same position as appointment page)
  ══════════════════════════════════════ -->
  <rect x="494" y="-112" width="376" height="564" rx="14" fill="#1A1612" opacity="0.30" filter="url(#sSb)"/>
  <rect x="500" y="-110" width="364" height="560" rx="12" fill="url(#sMirFrame)"/>
  <rect x="512" y="-98"  width="340" height="536" rx="9"  fill="#1A1612" opacity="0.50"/>
  <rect x="518" y="-92"  width="328" height="524" rx="7"  fill="url(#sMirSurf)"/>
  <rect x="518" y="-92"  width="328" height="524" rx="7"  fill="url(#sMirSheen)"/>
  <path d="M 540 -70 Q 660 -40 740 -70" stroke="#FFFFFF" stroke-width="0.6" fill="none" opacity="0.10"/>
  <path d="M 550 -50 Q 640 -25 720 -48" stroke="#FFFFFF" stroke-width="0.4" fill="none" opacity="0.07"/>

  <!-- OLIVHAIRSUPPLY placard inside mirror -->
  <rect x="552" y="-78" width="260" height="60" rx="3" fill="#1A1612" opacity="0.72"/>
  <line x1="557" y1="-60" x2="807" y2="-60" stroke="#C9A96E" stroke-width="0.8" opacity="0.55"/>
  <line x1="557" y1="-26" x2="807" y2="-26" stroke="#C9A96E" stroke-width="0.8" opacity="0.55"/>
  <text x="682" y="-48" font-family="'Cormorant Garamond',Georgia,serif" font-size="14" font-weight="300" fill="url(#sGoldT)" text-anchor="middle" letter-spacing="4" opacity="0.96">OLIVHAIRSUPPLY</text>
  <text x="682" y="-32" font-family="'Cormorant Garamond',Georgia,serif" font-size="8" font-style="italic" fill="#D4B87A" text-anchor="middle" letter-spacing="3.5" opacity="0.85">Berlin · Premium Hair</text>

  <!-- Mirror corner ornaments -->
  <circle cx="522"  cy="-88" r="5" fill="url(#sGoldH)" opacity="0.90"/>
  <circle cx="842"  cy="-88" r="5" fill="url(#sGoldH)" opacity="0.90"/>
  <circle cx="522"  cy="432" r="5" fill="url(#sGoldH)" opacity="0.90"/>
  <circle cx="842"  cy="432" r="5" fill="url(#sGoldH)" opacity="0.90"/>
  <circle cx="500"  cy="172" r="4" fill="url(#sGoldH)" opacity="0.85"/>
  <circle cx="864"  cy="172" r="4" fill="url(#sGoldH)" opacity="0.85"/>

  <!-- ══════════════════════════════════════
       LEFT — Luxury Shipping Table + Boxes
       touching mirror left frame (x≈500)
  ══════════════════════════════════════ -->
  <!-- Table shadow -->
  <ellipse cx="310" cy="452" rx="148" ry="9" fill="#060402" opacity="0.38" filter="url(#sSb)"/>
  <!-- Table legs -->
  <rect x="190" y="328" width="12" height="122" rx="4" fill="#1E1A16"/>
  <rect x="418" y="328" width="12" height="122" rx="4" fill="#1E1A16"/>
  <!-- Table surface -->
  <rect x="172" y="296" width="280" height="36" rx="6" fill="url(#sShelf)"/>
  <rect x="172" y="320" width="280" height="12" rx="2" fill="#1A1614" opacity="0.80"/>
  <line x1="172" y1="296" x2="452" y2="296" stroke="#C9A96E" stroke-width="1.2" opacity="0.42"/>

  <!-- Main large delivery box on table -->
  <rect x="200" y="152" width="198" height="148" rx="4" fill="url(#sBoxFace)" stroke="#3A3018" stroke-width="1.5"/>
  <!-- Box top lid -->
  <rect x="196" y="138" width="206" height="22" rx="3" fill="url(#sBoxTop)" stroke="url(#sGold)" stroke-width="1.2"/>
  <!-- Gold ribbon horizontal -->
  <rect x="200" y="194" width="198" height="14" fill="url(#sGold)" opacity="0.50"/>
  <!-- Gold ribbon vertical -->
  <rect x="290" y="138" width="18" height="162" fill="url(#sGold)" opacity="0.48"/>
  <!-- Box lid bevel line -->
  <line x1="200" y1="155" x2="398" y2="155" stroke="#C9A96E" stroke-width="0.6" opacity="0.30"/>
  <!-- OHS label on box -->
  <rect x="228" y="222" width="142" height="46" rx="2" fill="#1A1612" opacity="0.70"/>
  <line x1="232" y1="237" x2="366" y2="237" stroke="#C9A96E" stroke-width="0.6" opacity="0.45"/>
  <line x1="232" y1="261" x2="366" y2="261" stroke="#C9A96E" stroke-width="0.6" opacity="0.45"/>
  <text x="299" y="252" font-family="'Cormorant Garamond',Georgia,serif" font-size="11" fill="url(#sGoldT)" text-anchor="middle" letter-spacing="3.5" opacity="0.88">OLIVHAIRSUPPLY</text>
  <!-- Bow top centre -->
  <ellipse cx="299" cy="140" rx="26" ry="14" fill="url(#sGold)" opacity="0.80"/>
  <ellipse cx="270" cy="130" rx="22" ry="10" fill="url(#sGold)" opacity="0.68" transform="rotate(-28 270 130)"/>
  <ellipse cx="328" cy="130" rx="22" ry="10" fill="url(#sGold)" opacity="0.68" transform="rotate(28 328 130)"/>
  <line x1="286" y1="143" x2="260" y2="165" stroke="url(#sGold)" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
  <line x1="312" y1="143" x2="338" y2="165" stroke="url(#sGold)" stroke-width="7" stroke-linecap="round" opacity="0.55"/>

  <!-- Small stacked box (left of main) -->
  <rect x="172" y="236" width="94" height="62" rx="3" fill="url(#sBoxFace)" stroke="#3A3018" stroke-width="1"/>
  <rect x="170" y="226" width="98" height="14" rx="2" fill="url(#sBoxTop)" stroke="url(#sGold)" stroke-width="0.8"/>
  <rect x="213" y="226" width="8" height="72" fill="url(#sGold)" opacity="0.40"/>
  <rect x="172" y="262" width="94" height="7"  fill="url(#sGold)" opacity="0.38"/>

  <!-- Round hair product jar on table -->
  <ellipse cx="432" cy="296" rx="16" ry="5" fill="#060402" opacity="0.35" filter="url(#sMb)"/>
  <ellipse cx="432" cy="254" rx="22" ry="26" fill="#1E1C18"/>
  <ellipse cx="432" cy="248" rx="16" ry="10" fill="#2A2824"/>
  <rect x="426" y="238" width="12" height="10" rx="2" fill="#242018"/>
  <text x="432" y="268" font-family="'Montserrat',sans-serif" font-size="5" fill="#C9A96E" text-anchor="middle" letter-spacing="1.5" transform="rotate(-90,432,268)" opacity="0.65">BIZILUXE</text>

  <!-- ══════════════════════════════════════
       RIGHT — Elegant shelf + stacked boxes
       touching mirror right frame (x≈864)
  ══════════════════════════════════════ -->
  <!-- Shelf shadow -->
  <ellipse cx="1040" cy="452" rx="148" ry="9" fill="#060402" opacity="0.38" filter="url(#sSb)"/>
  <!-- Shelf legs -->
  <rect x="920" y="328" width="12" height="122" rx="4" fill="#1E1A16"/>
  <rect x="1148" y="328" width="12" height="122" rx="4" fill="#1E1A16"/>
  <!-- Shelf surface -->
  <rect x="900" y="296" width="280" height="36" rx="6" fill="url(#sShelf)"/>
  <rect x="900" y="320" width="280" height="12" rx="2" fill="#1A1614" opacity="0.80"/>
  <line x1="900" y1="296" x2="1180" y2="296" stroke="#C9A96E" stroke-width="1.2" opacity="0.42"/>

  <!-- Tall box right -->
  <rect x="966" y="116" width="172" height="182" rx="4" fill="url(#sBoxFace)" stroke="#3A3018" stroke-width="1.5"/>
  <rect x="962" y="102" width="180" height="20" rx="3" fill="url(#sBoxTop)" stroke="url(#sGold)" stroke-width="1.2"/>
  <!-- Gold ribbon -->
  <rect x="966" y="198" width="172" height="14" fill="url(#sGold)" opacity="0.50"/>
  <rect x="1046" y="102" width="16" height="196" fill="url(#sGold)" opacity="0.46"/>
  <!-- Label -->
  <rect x="990" y="228" width="124" height="44" rx="2" fill="#1A1612" opacity="0.70"/>
  <line x1="994" y1="242" x2="1110" y2="242" stroke="#C9A96E" stroke-width="0.6" opacity="0.45"/>
  <line x1="994" y1="264" x2="1110" y2="264" stroke="#C9A96E" stroke-width="0.6" opacity="0.45"/>
  <text x="1052" y="256" font-family="'Cormorant Garamond',Georgia,serif" font-size="11" fill="url(#sGoldT)" text-anchor="middle" letter-spacing="3" opacity="0.88">OLIVHAIRSUPPLY</text>
  <!-- Bow -->
  <ellipse cx="1054" cy="103" rx="26" ry="13" fill="url(#sGold)" opacity="0.78"/>
  <ellipse cx="1026" cy="94"  rx="20" ry="9"  fill="url(#sGold)" opacity="0.66" transform="rotate(-28 1026 94)"/>
  <ellipse cx="1082" cy="94"  rx="20" ry="9"  fill="url(#sGold)" opacity="0.66" transform="rotate(28 1082 94)"/>
  <line x1="1042" y1="106" x2="1018" y2="128" stroke="url(#sGold)" stroke-width="6" stroke-linecap="round" opacity="0.52"/>
  <line x1="1066" y1="106" x2="1090" y2="128" stroke="url(#sGold)" stroke-width="6" stroke-linecap="round" opacity="0.52"/>

  <!-- Small stacked box right -->
  <rect x="1098" y="234" width="82" height="64" rx="3" fill="url(#sBoxFace)" stroke="#3A3018" stroke-width="1"/>
  <rect x="1096" y="224" width="86" height="14" rx="2" fill="url(#sBoxTop)" stroke="url(#sGold)" stroke-width="0.8"/>
  <rect x="1133" y="224" width="8"  height="74" fill="url(#sGold)" opacity="0.38"/>
  <rect x="1098" y="260" width="82" height="7"  fill="url(#sGold)" opacity="0.36"/>

  <!-- Comb on right shelf -->
  <rect x="910" y="289" width="56" height="7" rx="2" fill="#1A1814"/>
  <g stroke="#3A3630" stroke-width="1.1" opacity="0.60">
    <line x1="914" y1="289" x2="914" y2="281"/><line x1="919" y1="289" x2="919" y2="279"/>
    <line x1="924" y1="289" x2="924" y2="281"/><line x1="929" y1="289" x2="929" y2="279"/>
    <line x1="934" y1="289" x2="934" y2="281"/><line x1="939" y1="289" x2="939" y2="279"/>
    <line x1="944" y1="289" x2="944" y2="281"/><line x1="949" y1="289" x2="949" y2="281"/>
  </g>

  <!-- ─── VIGNETTES ─── -->
  <rect x="-308" y="-124" width="508" height="829" fill="url(#svigL)"/>
  <rect x="1240" y="-124" width="509" height="829" fill="url(#svigR)"/>
  <rect x="-308" y="370"  width="2057" height="335" fill="url(#svigB)"/>
</svg>
