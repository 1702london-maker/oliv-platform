<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 440" preserveAspectRatio="xMidYMid slice" width="1440" height="440">
  <defs>

    <!-- Background gradients -->
    <linearGradient id="sh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1A140E"/>
      <stop offset="50%" stop-color="#2C2118"/>
      <stop offset="100%" stop-color="#130F09"/>
    </linearGradient>
    <radialGradient id="sh-glow" cx="72%" cy="45%" r="48%">
      <stop offset="0%"   stop-color="#7B5A1E" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#1A140E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sh-vignette" cx="50%" cy="50%" r="70%">
      <stop offset="40%" stop-color="#1A140E" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0705" stop-opacity="0.88"/>
    </radialGradient>

    <!-- Gold gradients -->
    <linearGradient id="sh-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#6B4710"/>
      <stop offset="28%" stop-color="#C9A96E"/>
      <stop offset="58%" stop-color="#E8CB85"/>
      <stop offset="100%" stop-color="#8A6120"/>
    </linearGradient>
    <linearGradient id="sh-gold-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C9A96E" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#C9A96E" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#C9A96E" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sh-shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C9A96E" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#C9A96E" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#C9A96E" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </linearGradient>

    <!-- Mirror glass -->
    <linearGradient id="sh-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8E8C7A" stop-opacity="0.28"/>
      <stop offset="50%"  stop-color="#D6CFA8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5A574B" stop-opacity="0.38"/>
    </linearGradient>

    <!-- Soft box shadow -->
    <filter id="sh-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="sh-glow-f" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#C9A96E" flood-opacity="0.25"/>
    </filter>

    <!-- Subtle grain -->
    <pattern id="sh-grain" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="transparent"/>
      <circle cx="14" cy="18" r="0.8" fill="#fff" opacity="0.025"/>
      <circle cx="72" cy="46" r="0.8" fill="#000" opacity="0.06"/>
      <circle cx="38" cy="82" r="0.8" fill="#fff" opacity="0.018"/>
      <circle cx="90" cy="72" r="0.8" fill="#000" opacity="0.04"/>
    </pattern>

    <!-- Elegant line shimmer -->
    <linearGradient id="sh-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C9A96E" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#C9A96E" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#E8CB85" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#C9A96E" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <!-- Base layers -->
  <rect width="1440" height="440" fill="url(#sh-bg)"/>
  <rect width="1440" height="440" fill="url(#sh-grain)" opacity="0.7"/>
  <rect width="1440" height="440" fill="url(#sh-glow)"/>

  <!-- Subtle hair-line curves (left third — atmospheric) -->
  <g opacity="0.07" stroke="#C9A96E" stroke-width="1" fill="none">
    <path d="M 0 200 Q 200 170 420 210 Q 620 248 900 195"/>
    <path d="M 0 220 Q 200 192 420 230 Q 620 266 900 215"/>
    <path d="M 0 182 Q 200 155 420 192 Q 600 228 880 180"/>
    <path d="M 0 240 Q 180 215 400 248 Q 600 282 880 232"/>
    <path d="M 0 160 Q 200 138 420 170 Q 600 202 860 162"/>
  </g>

  <!-- ── MIRROR (right side, centred-right) ── -->
  <g filter="url(#sh-shadow)">
    <!-- Outer gold frame -->
    <rect x="820" y="20" width="560" height="410" rx="18" fill="url(#sh-gold)"/>
    <!-- Inner glass -->
    <rect x="838" y="38" width="524" height="374" rx="12" fill="url(#sh-glass)" stroke="#5A4018" stroke-width="2"/>
    <!-- Dark reflection fill -->
    <rect x="854" y="54" width="492" height="342" rx="8" fill="#1E1B16" opacity="0.55"/>
    <!-- Corner jewels -->
    <circle cx="838"  cy="38"  r="10" fill="url(#sh-gold)"/>
    <circle cx="1362" cy="38"  r="10" fill="url(#sh-gold)"/>
    <circle cx="838"  cy="412" r="10" fill="url(#sh-gold)"/>
    <circle cx="1362" cy="412" r="10" fill="url(#sh-gold)"/>
    <!-- Side jewels -->
    <circle cx="820"  cy="225" r="9"  fill="url(#sh-gold)"/>
    <circle cx="1380" cy="225" r="9"  fill="url(#sh-gold)"/>
  </g>

  <!-- ── BRAND PLACARD inside mirror ── -->
  <g filter="url(#sh-glow-f)">
    <rect x="892" y="60" width="416" height="96" rx="6" fill="#12100D"/>
    <line x1="922" y1="90"  x2="1278" y2="90"  stroke="url(#sh-gold)" stroke-width="1.8"/>
    <line x1="922" y1="146" x2="1278" y2="146" stroke="url(#sh-gold)" stroke-width="1.8"/>
    <text x="1100" y="124" text-anchor="middle"
          fill="#C9A96E" font-family="Georgia,'Times New Roman',serif"
          font-size="26" letter-spacing="10">OLIVHAIRSUPPLY</text>
    <text x="1100" y="162" text-anchor="middle"
          fill="#C9A96E" font-family="Georgia,'Times New Roman',serif"
          font-size="18" font-style="italic" letter-spacing="7">Berlin · Premium Hair</text>
  </g>

  <!-- ── SHIPPING PACKAGE / BOX (left of mirror) ── -->
  <g filter="url(#sh-shadow)" transform="translate(148 120)">
    <!-- Box body -->
    <rect x="0" y="120" width="320" height="220" rx="6" fill="#1C1A16" stroke="#4A3A1A" stroke-width="2"/>
    <!-- Box lid top face -->
    <rect x="0" y="90" width="320" height="38" rx="4" fill="#232018" stroke="url(#sh-gold)" stroke-width="2"/>
    <!-- Box lid bevel -->
    <rect x="8" y="94" width="304" height="30" rx="3" fill="#2A2620"/>
    <!-- Gold ribbon vertical -->
    <rect x="148" y="90" width="24" height="250" fill="url(#sh-gold)" opacity="0.55"/>
    <!-- Gold ribbon horizontal -->
    <rect x="0" y="204" width="320" height="16" fill="url(#sh-gold)" opacity="0.55"/>
    <!-- Ribbon bow top-left knot -->
    <ellipse cx="160" cy="90" rx="34" ry="18" fill="url(#sh-gold)" opacity="0.8"/>
    <ellipse cx="124" cy="78" rx="28" ry="12" fill="url(#sh-gold)" opacity="0.7" transform="rotate(-28 124 78)"/>
    <ellipse cx="196" cy="78" rx="28" ry="12" fill="url(#sh-gold)" opacity="0.7" transform="rotate(28 196 78)"/>
    <!-- Ribbon bow tails -->
    <line x1="145" y1="90" x2="115" y2="118" stroke="url(#sh-gold)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <line x1="175" y1="90" x2="205" y2="118" stroke="url(#sh-gold)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <!-- OHS branding on box -->
    <text x="160" y="185" text-anchor="middle"
          fill="#C9A96E" font-family="Georgia,serif"
          font-size="13" letter-spacing="6" opacity="0.6">OLIVHAIRSUPPLY</text>
    <!-- Bottom shadow line -->
    <ellipse cx="160" cy="340" rx="155" ry="16" fill="#000" opacity="0.45"/>
  </g>

  <!-- ── DECORATIVE GOLD RULES ── -->
  <line x1="148" y1="52"  x2="780" y2="52"  stroke="url(#sh-gold-h)" stroke-width="1" opacity="0.45"/>
  <line x1="148" y1="400" x2="780" y2="400" stroke="url(#sh-gold-h)" stroke-width="1" opacity="0.45"/>

  <!-- ── SMALL CORNER ORNAMENTS (left text area) ── -->
  <g opacity="0.35" fill="none" stroke="#C9A96E" stroke-width="1">
    <path d="M 148 72 L 148 58 L 162 58"/>
    <path d="M 560 72 L 560 58 L 546 58"/>
  </g>

  <!-- Vignette + shimmer top/bottom edges -->
  <rect width="1440" height="440" fill="url(#sh-vignette)"/>
  <rect x="0" y="0"   width="1440" height="2" fill="url(#sh-shimmer)"/>
  <rect x="0" y="438" width="1440" height="2" fill="url(#sh-shimmer)"/>

</svg>
