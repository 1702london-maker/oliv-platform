<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 520" preserveAspectRatio="xMidYMid slice" width="390" height="520">
  <defs>
    <linearGradient id="mBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#424040"/>
      <stop offset="50%"  stop-color="#5E5A56"/>
      <stop offset="100%" stop-color="#4A4744"/>
    </linearGradient>
    <linearGradient id="mTopS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C1810" stop-opacity="0.55"/>
      <stop offset="40%"  stop-color="#1C1810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#100C08" stop-opacity="0.42"/>
    </linearGradient>
    <radialGradient id="mKey" cx="60%" cy="18%" r="55%">
      <stop offset="0%"   stop-color="#807060" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5E5A56" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#363230"/>
      <stop offset="100%" stop-color="#242018"/>
    </linearGradient>

    <!-- Gold -->
    <linearGradient id="mGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#A07818"/>
      <stop offset="25%"  stop-color="#D4B060"/>
      <stop offset="50%"  stop-color="#E8C870"/>
      <stop offset="75%"  stop-color="#C9A040"/>
      <stop offset="100%" stop-color="#9A7018"/>
    </linearGradient>
    <linearGradient id="mGoldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#A07818"/>
      <stop offset="40%"  stop-color="#C9A96E"/>
      <stop offset="70%"  stop-color="#D4B478"/>
      <stop offset="100%" stop-color="#9A7018"/>
    </linearGradient>
    <linearGradient id="mGoldT" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#B8900A"/>
      <stop offset="50%"  stop-color="#E8C858"/>
      <stop offset="100%" stop-color="#C09828"/>
    </linearGradient>
    <linearGradient id="mMirFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#A07818"/>
      <stop offset="28%"  stop-color="#D4B060"/>
      <stop offset="55%"  stop-color="#E8C870"/>
      <stop offset="80%"  stop-color="#C9A040"/>
      <stop offset="100%" stop-color="#9A7018"/>
    </linearGradient>
    <linearGradient id="mMirSurf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6E6A66" stop-opacity="0.68"/>
      <stop offset="50%"  stop-color="#7A7672" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#5A5652" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="mMirSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFF" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#FFF" stop-opacity="0.14"/>
      <stop offset="60%"  stop-color="#FFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mBoxF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#201C14"/>
      <stop offset="100%" stop-color="#121008"/>
    </linearGradient>
    <linearGradient id="mBoxT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2C2418"/>
      <stop offset="100%" stop-color="#1C1810"/>
    </linearGradient>
    <linearGradient id="mShelf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2E2A26"/>
      <stop offset="100%" stop-color="#1A1614"/>
    </linearGradient>
    <linearGradient id="mVigB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D0D0D0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#D0D0D0" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="mSb"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="mMb"><feGaussianBlur stdDeviation="1.2"/></filter>
  </defs>

  <!-- Backdrop -->
  <rect width="390" height="520" fill="url(#mBg)"/>
  <rect width="390" height="520" fill="url(#mTopS)"/>
  <rect width="390" height="520" fill="url(#mKey)"/>
  <!-- Floor -->
  <rect x="0" y="430" width="390" height="90" fill="url(#mFloor)"/>
  <rect x="0" y="428" width="390" height="4"  fill="#14100C" opacity="0.38"/>

  <!-- ── MIRROR — centre x:195, moved down 35px ── -->
  <rect x="124" y="49" width="142" height="296" rx="8" fill="#1A1612" opacity="0.28" filter="url(#mSb)"/>
  <rect x="126" y="47" width="138" height="296" rx="8" fill="url(#mMirFrame)"/>
  <rect x="133" y="54" width="124" height="282" rx="6" fill="#1A1612" opacity="0.50"/>
  <rect x="137" y="58" width="116" height="274" rx="4" fill="url(#mMirSurf)"/>
  <rect x="137" y="58" width="116" height="274" rx="4" fill="url(#mMirSheen)"/>
  <!-- Mirror shimmer -->
  <path d="M 148 77 Q 195 63 240 77" stroke="#FFF" stroke-width="0.5" fill="none" opacity="0.09"/>
  <!-- Corner jewels -->
  <circle cx="135" cy="55"  r="4" fill="url(#mGoldH)" opacity="0.92"/>
  <circle cx="255" cy="55"  r="4" fill="url(#mGoldH)" opacity="0.92"/>
  <circle cx="135" cy="334" r="4" fill="url(#mGoldH)" opacity="0.92"/>
  <circle cx="255" cy="334" r="4" fill="url(#mGoldH)" opacity="0.92"/>
  <!-- Side jewels -->
  <circle cx="126" cy="195" r="3.5" fill="url(#mGoldH)" opacity="0.88"/>
  <circle cx="264" cy="195" r="3.5" fill="url(#mGoldH)" opacity="0.88"/>

  <!-- Brand placard inside mirror — full glass width, text sized to fit -->
  <rect x="141" y="65" width="108" height="46" rx="3" fill="#12100D" opacity="0.75"/>
  <line x1="145" y1="79"  x2="245" y2="79"  stroke="#C9A96E" stroke-width="0.8" opacity="0.55"/>
  <line x1="145" y1="103" x2="245" y2="103" stroke="#C9A96E" stroke-width="0.8" opacity="0.55"/>
  <text x="195" y="94" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="11" fill="url(#mGoldT)" letter-spacing="1.5" opacity="0.95">OLIVHAIRSUPPLY</text>
  <text x="195" y="107" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="7" font-style="italic" fill="#D4B87A" letter-spacing="2" opacity="0.82">Berlin · Premium Hair</text>

  <!-- ── LEFT TABLE + BOX ── -->
  <!-- Table shadow -->
  <ellipse cx="62" cy="432" rx="56" ry="5" fill="#060402" opacity="0.38" filter="url(#mSb)"/>
  <!-- Table legs -->
  <rect x="20" y="348" width="6" height="84" rx="2" fill="#1E1A16"/>
  <rect x="100" y="348" width="6" height="84" rx="2" fill="#1E1A16"/>
  <!-- Table top -->
  <rect x="10" y="328" width="108" height="24" rx="4" fill="url(#mShelf)"/>
  <rect x="10" y="342" width="108" height="8"  rx="2" fill="#1A1614" opacity="0.80"/>
  <line x1="10" y1="328" x2="118" y2="328" stroke="#C9A96E" stroke-width="0.8" opacity="0.42"/>

  <!-- Main box left -->
  <rect x="18" y="218" width="90" height="114" rx="3" fill="url(#mBoxF)" stroke="#3A3018" stroke-width="1"/>
  <!-- Lid -->
  <rect x="15" y="207" width="96" height="16" rx="2" fill="url(#mBoxT)" stroke="url(#mGold)" stroke-width="0.9"/>
  <!-- Gold ribbon V -->
  <rect x="58" y="207" width="10" height="128" fill="url(#mGold)" opacity="0.46"/>
  <!-- Gold ribbon H -->
  <rect x="18" y="264" width="90" height="8"  fill="url(#mGold)" opacity="0.44"/>
  <!-- Bow -->
  <ellipse cx="63" cy="208" rx="16" ry="9"  fill="url(#mGold)" opacity="0.80"/>
  <ellipse cx="47" cy="202" rx="13" ry="6"  fill="url(#mGold)" opacity="0.68" transform="rotate(-28 47 202)"/>
  <ellipse cx="79" cy="202" rx="13" ry="6"  fill="url(#mGold)" opacity="0.68" transform="rotate(28 79 202)"/>
  <line x1="57" y1="210" x2="44" y2="224" stroke="url(#mGold)" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <line x1="69" y1="210" x2="82" y2="224" stroke="url(#mGold)" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <!-- Label -->
  <rect x="26" y="278" width="74" height="30" rx="2" fill="#1A1612" opacity="0.70"/>
  <line x1="29" y1="288" x2="97" y2="288" stroke="#C9A96E" stroke-width="0.5" opacity="0.45"/>
  <line x1="29" y1="300" x2="97" y2="300" stroke="#C9A96E" stroke-width="0.5" opacity="0.45"/>
  <text x="63" y="296" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="6.5" fill="url(#mGoldT)" letter-spacing="1.8" opacity="0.88">OLIVHAIRSUPPLY</text>

  <!-- Small box stacked left -->
  <rect x="10" y="272" width="44" height="56" rx="2" fill="url(#mBoxF)" stroke="#3A3018" stroke-width="0.8"/>
  <rect x="8"  y="263" width="48" height="12" rx="2" fill="url(#mBoxT)" stroke="url(#mGold)" stroke-width="0.7"/>
  <rect x="29" y="263" width="6"  height="66" fill="url(#mGold)" opacity="0.38"/>
  <rect x="10" y="295" width="44" height="6"  fill="url(#mGold)" opacity="0.36"/>

  <!-- ── RIGHT TABLE + BOX ── -->
  <!-- Table shadow -->
  <ellipse cx="328" cy="432" rx="56" ry="5" fill="#060402" opacity="0.38" filter="url(#mSb)"/>
  <!-- Table legs -->
  <rect x="284" y="348" width="6" height="84" rx="2" fill="#1E1A16"/>
  <rect x="364" y="348" width="6" height="84" rx="2" fill="#1E1A16"/>
  <!-- Table top -->
  <rect x="272" y="328" width="108" height="24" rx="4" fill="url(#mShelf)"/>
  <rect x="272" y="342" width="108" height="8"  rx="2" fill="#1A1614" opacity="0.80"/>
  <line x1="272" y1="328" x2="380" y2="328" stroke="#C9A96E" stroke-width="0.8" opacity="0.42"/>

  <!-- Tall box right -->
  <rect x="282" y="190" width="96" height="140" rx="3" fill="url(#mBoxF)" stroke="#3A3018" stroke-width="1"/>
  <!-- Lid -->
  <rect x="279" y="178" width="102" height="16" rx="2" fill="url(#mBoxT)" stroke="url(#mGold)" stroke-width="0.9"/>
  <!-- Gold ribbon V -->
  <rect x="326" y="178" width="10"  height="154" fill="url(#mGold)" opacity="0.46"/>
  <!-- Gold ribbon H -->
  <rect x="282" y="258" width="96"  height="8"   fill="url(#mGold)" opacity="0.44"/>
  <!-- Bow -->
  <ellipse cx="331" cy="179" rx="16" ry="9"  fill="url(#mGold)" opacity="0.78"/>
  <ellipse cx="315" cy="173" rx="13" ry="6"  fill="url(#mGold)" opacity="0.66" transform="rotate(-28 315 173)"/>
  <ellipse cx="347" cy="173" rx="13" ry="6"  fill="url(#mGold)" opacity="0.66" transform="rotate(28 347 173)"/>
  <line x1="325" y1="181" x2="312" y2="195" stroke="url(#mGold)" stroke-width="5" stroke-linecap="round" opacity="0.52"/>
  <line x1="337" y1="181" x2="350" y2="195" stroke="url(#mGold)" stroke-width="5" stroke-linecap="round" opacity="0.52"/>
  <!-- Label -->
  <rect x="291" y="272" width="74" height="30" rx="2" fill="#1A1612" opacity="0.70"/>
  <line x1="294" y1="282" x2="362" y2="282" stroke="#C9A96E" stroke-width="0.5" opacity="0.45"/>
  <line x1="294" y1="294" x2="362" y2="294" stroke="#C9A96E" stroke-width="0.5" opacity="0.45"/>
  <text x="328" y="290" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="6.5" fill="url(#mGoldT)" letter-spacing="1.8" opacity="0.88">OLIVHAIRSUPPLY</text>

  <!-- Small box stacked right -->
  <rect x="338" y="272" width="44" height="56" rx="2" fill="url(#mBoxF)" stroke="#3A3018" stroke-width="0.8"/>
  <rect x="336" y="263" width="48" height="12" rx="2" fill="url(#mBoxT)" stroke="url(#mGold)" stroke-width="0.7"/>
  <rect x="356" y="263" width="6"  height="66" fill="url(#mGold)" opacity="0.38"/>
  <rect x="338" y="295" width="44" height="6"  fill="url(#mGold)" opacity="0.36"/>

  <!-- Vignette -->
  <rect width="390" height="520" fill="url(#mVigB)"/>
</svg>
