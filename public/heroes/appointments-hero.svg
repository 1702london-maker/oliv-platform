<svg xmlns="http://www.w3.org/2000/svg" viewBox="-308 -124 2057 829" preserveAspectRatio="xMidYMid slice" width="1440" height="580">
  <defs>
    <!-- Studio backdrop — exact wholesale palette -->
    <linearGradient id="aBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#424040"/>
      <stop offset="28%"  stop-color="#555250"/>
      <stop offset="54%"  stop-color="#5E5A56"/>
      <stop offset="78%"  stop-color="#575350"/>
      <stop offset="100%" stop-color="#4A4744"/>
    </linearGradient>
    <linearGradient id="aTopS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C1810" stop-opacity="0.52"/>
      <stop offset="38%"  stop-color="#1C1810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#100C08" stop-opacity="0.38"/>
    </linearGradient>
    <radialGradient id="aKey" cx="72%" cy="14%" r="55%">
      <stop offset="0%"   stop-color="#807060" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#5E5A56" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#363230"/>
      <stop offset="100%" stop-color="#242018"/>
    </linearGradient>
    <linearGradient id="vigL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vigR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8C8C8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C8C8C8" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="vigB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D0D0D0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#D0D0D0" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Mirror frame — gold -->
    <linearGradient id="aMirFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#A07818"/>
      <stop offset="25%"  stop-color="#D4B060"/>
      <stop offset="50%"  stop-color="#E8C870"/>
      <stop offset="75%"  stop-color="#C9A040"/>
      <stop offset="100%" stop-color="#9A7018"/>
    </linearGradient>
    <!-- Mirror surface -->
    <linearGradient id="aMirSurf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6E6A66" stop-opacity="0.68"/>
      <stop offset="50%"  stop-color="#7A7672" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#5A5652" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="aMirSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="22%"  stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="55%"  stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Chair leather -->
    <linearGradient id="aChL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#282420"/>
      <stop offset="40%"  stop-color="#141210"/>
      <stop offset="100%" stop-color="#0E0C0A"/>
    </linearGradient>
    <!-- Chair metal -->
    <linearGradient id="aChM" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#484440"/>
      <stop offset="35%"  stop-color="#686460"/>
      <stop offset="62%"  stop-color="#888280"/>
      <stop offset="100%" stop-color="#383430"/>
    </linearGradient>
    <!-- Chair gold -->
    <linearGradient id="aChGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#A07818"/>
      <stop offset="40%"  stop-color="#C9A96E"/>
      <stop offset="70%"  stop-color="#D4B478"/>
      <stop offset="100%" stop-color="#9A7018"/>
    </linearGradient>

    <!-- Vanity -->
    <linearGradient id="aVanTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2E2A26"/>
      <stop offset="100%" stop-color="#1A1614"/>
    </linearGradient>
    <radialGradient id="aVanMir" cx="40%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#8A8682" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5A5652" stop-opacity="0.4"/>
    </radialGradient>

    <!-- Gold brand text -->
    <linearGradient id="aGoldT" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#B8900A"/>
      <stop offset="50%"  stop-color="#E8C858"/>
      <stop offset="100%" stop-color="#C09828"/>
    </linearGradient>
    <linearGradient id="aBkFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#201C14"/>
      <stop offset="100%" stop-color="#121008"/>
    </linearGradient>
    <linearGradient id="aBkTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2C2418"/>
      <stop offset="100%" stop-color="#1C1810"/>
    </linearGradient>

    <filter id="aSb"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="aMb"><feGaussianBlur stdDeviation="1.8"/></filter>
  </defs>

  <!-- ─── BACKDROP (same as wholesale) ─── -->
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#aBg)"/>
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#aTopS)"/>
  <rect x="-308" y="-124" width="2057" height="829" fill="url(#aKey)"/>
  <rect x="-308" y="448"  width="2057" height="257" fill="url(#aFloor)"/>
  <rect x="-308" y="445"  width="2057" height="5"   fill="#14100C" opacity="0.38"/>

  <!-- ══════════════════════════════════════
       LARGE SALON MIRROR — placed like
       wholesale product boxes, centre x:680
  ══════════════════════════════════════ -->
  <!-- Mirror wall shadow -->
  <rect x="494" y="-112" width="376" height="564" rx="14" fill="#1A1612" opacity="0.30" filter="url(#aSb)"/>
  <!-- Gold outer frame -->
  <rect x="500" y="-110" width="364" height="560" rx="12" fill="url(#aMirFrame)"/>
  <!-- Inner dark border -->
  <rect x="512" y="-98"  width="340" height="536" rx="9"  fill="#1A1612" opacity="0.50"/>
  <!-- Mirror surface -->
  <rect x="518" y="-92"  width="328" height="524" rx="7"  fill="url(#aMirSurf)"/>
  <rect x="518" y="-92"  width="328" height="524" rx="7"  fill="url(#aMirSheen)"/>
  <!-- Reflection shimmer lines -->
  <path d="M 540 -70 Q 660 -40 740 -70" stroke="#FFFFFF" stroke-width="0.6" fill="none" opacity="0.10"/>
  <path d="M 550 -50 Q 640 -25 720 -48" stroke="#FFFFFF" stroke-width="0.4" fill="none" opacity="0.07"/>

  <!-- OHS PREMIUM HAIR — inside mirror top, centred x:682 -->
  <rect x="552" y="-78" width="260" height="60" rx="3" fill="#1A1612" opacity="0.72"/>
  <line x1="557" y1="-60" x2="807" y2="-60" stroke="#C9A96E" stroke-width="0.8" opacity="0.55"/>
  <line x1="557" y1="-26" x2="807" y2="-26" stroke="#C9A96E" stroke-width="0.8" opacity="0.55"/>
  <text x="682" y="-48" font-family="'Cormorant Garamond',Georgia,serif" font-size="14" font-weight="300" fill="url(#aGoldT)" text-anchor="middle" letter-spacing="4" opacity="0.96">OLIVHAIRSUPPLY</text>
  <text x="682" y="-32" font-family="'Cormorant Garamond',Georgia,serif" font-size="8" font-style="italic" fill="#D4B87A" text-anchor="middle" letter-spacing="3.5" opacity="0.85">Berlin · Premium Hair</text>

  <!-- Mirror corner ornaments -->
  <circle cx="522"  cy="-88" r="5" fill="url(#aChGold)" opacity="0.90"/>
  <circle cx="842"  cy="-88" r="5" fill="url(#aChGold)" opacity="0.90"/>
  <circle cx="522"  cy="432" r="5" fill="url(#aChGold)" opacity="0.90"/>
  <circle cx="842"  cy="432" r="5" fill="url(#aChGold)" opacity="0.90"/>
  <circle cx="500"  cy="172" r="4" fill="url(#aChGold)" opacity="0.85"/>
  <circle cx="864"  cy="172" r="4" fill="url(#aChGold)" opacity="0.85"/>

  <!-- ══════════════════════════════════════
       SALON CHAIR — centre x:682, like
       wholesale's product display centrepiece
  ══════════════════════════════════════ -->
  <ellipse cx="682" cy="454" rx="118" ry="10" fill="#060402" opacity="0.50" filter="url(#aSb)"/>
  <ellipse cx="682" cy="450" rx="88"  ry="8"  fill="#1A1614" opacity="0.90"/>
  <!-- Column -->
  <rect x="666" y="318" width="32" height="132" fill="url(#aChM)"/>
  <rect x="670" y="318" width="8"  height="132" fill="#888280" opacity="0.28"/>
  <!-- Hydraulic -->
  <rect x="658" y="296" width="48" height="30" rx="5" fill="#282420"/>
  <rect x="661" y="298" width="42" height="26" rx="4" fill="#363230"/>
  <!-- Seat -->
  <rect x="602" y="256" width="160" height="56" rx="16" fill="url(#aChL)"/>
  <rect x="604" y="258" width="156" height="18" rx="10" fill="#282420" opacity="0.55"/>
  <line x1="626" y1="273" x2="738" y2="273" stroke="#3A3430" stroke-width="0.8" opacity="0.42"/>
  <line x1="626" y1="292" x2="738" y2="292" stroke="#3A3430" stroke-width="0.8" opacity="0.35"/>
  <!-- Backrest — original height -->
  <rect x="628" y="80"  width="108" height="180" rx="20" fill="url(#aChL)"/>
  <rect x="632" y="84"  width="100" height="172" rx="16" fill="#1A1614"/>
  <line x1="648" y1="124" x2="722" y2="124" stroke="#2A2420" stroke-width="0.8" opacity="0.38"/>
  <line x1="648" y1="172" x2="722" y2="172" stroke="#2A2420" stroke-width="0.7" opacity="0.32"/>
  <line x1="648" y1="218" x2="722" y2="218" stroke="#2A2420" stroke-width="0.7" opacity="0.28"/>
  <text x="682" y="166" font-family="'Cormorant Garamond',Georgia,serif" font-size="14" font-style="italic" fill="#C9A96E" text-anchor="middle" letter-spacing="3" opacity="0.28">OHS</text>
  <!-- Gold footrest -->
  <rect x="590" y="376" width="184" height="8" rx="4" fill="url(#aChGold)"/>
  <ellipse cx="595" cy="380" rx="5" ry="5" fill="#C9A96E" opacity="0.90"/>
  <ellipse cx="769" cy="380" rx="5" ry="5" fill="#C9A96E" opacity="0.90"/>
  <!-- Armrests -->
  <rect x="597" y="239" width="12" height="44" rx="4" fill="url(#aChM)"/>
  <rect x="755" y="239" width="12" height="44" rx="4" fill="url(#aChM)"/>
  <rect x="593" y="234" width="20" height="11" rx="3" fill="#1A1614"/>
  <rect x="751" y="234" width="20" height="11" rx="3" fill="#1A1614"/>
  <!-- Chair reflection in mirror -->
  <rect x="638" y="172" width="90" height="180" rx="10" fill="#282420" opacity="0.12" filter="url(#aMb)"/>

  <!-- ══════════════════════════════════════
       VANITY TABLE — right edge x:500
       touching mirror left frame, like
       wholesale's scissors on the left side
  ══════════════════════════════════════ -->
  <ellipse cx="358" cy="452" rx="128" ry="9"  fill="#060402" opacity="0.38" filter="url(#aSb)"/>
  <!-- Table legs -->
  <rect x="242" y="330" width="12" height="120" rx="4" fill="#1E1A16"/>
  <rect x="448" y="330" width="12" height="120" rx="4" fill="#1E1A16"/>
  <!-- Table top -->
  <rect x="224" y="298" width="252" height="36" rx="6" fill="url(#aVanTop)"/>
  <rect x="224" y="322" width="252" height="10" rx="2" fill="#1A1614" opacity="0.80"/>
  <line x1="224" y1="298" x2="476" y2="298" stroke="#C9A96E" stroke-width="1.2" opacity="0.42"/>

  <!-- Products on vanity -->
  <rect x="262" y="228" width="26" height="72" rx="6" fill="#1A1814"/>
  <rect x="264" y="230" width="22" height="68" rx="5" fill="#242018"/>
  <rect x="268" y="226" width="14" height="8"  rx="2" fill="#2A2420"/>
  <text x="275" y="265" font-family="'Montserrat',sans-serif" font-size="5" fill="#C9A96E" text-anchor="middle" letter-spacing="1.5" transform="rotate(-90,275,265)" opacity="0.70">BIZILUXE</text>
  <ellipse cx="318" cy="282" rx="18" ry="22" fill="#1E1C18"/>
  <ellipse cx="318" cy="276" rx="12" ry="9"  fill="#2A2824"/>
  <rect x="313" y="267" width="10" height="9"  rx="2" fill="#242018"/>
  <rect x="342" y="244" width="20" height="56" rx="5" fill="#201E1A"/>
  <rect x="344" y="246" width="16" height="52" rx="4" fill="#2C2A26"/>
  <rect x="347" y="242" width="10" height="6"  rx="2" fill="#242018"/>
  <!-- Comb on vanity -->
  <rect x="384" y="293" width="56" height="7"  rx="2" fill="#1A1814"/>
  <g stroke="#3A3630" stroke-width="1.1" opacity="0.60">
    <line x1="388" y1="293" x2="388" y2="285"/><line x1="393" y1="293" x2="393" y2="283"/>
    <line x1="398" y1="293" x2="398" y2="285"/><line x1="403" y1="293" x2="403" y2="283"/>
    <line x1="408" y1="293" x2="408" y2="285"/><line x1="413" y1="293" x2="413" y2="283"/>
    <line x1="418" y1="293" x2="418" y2="285"/><line x1="423" y1="293" x2="423" y2="285"/>
    <line x1="428" y1="293" x2="428" y2="285"/><line x1="433" y1="293" x2="433" y2="285"/>
  </g>

  <!-- Small round vanity mirror -->
  <rect x="232" y="266" width="6" height="35" rx="3" fill="#2A2420"/>
  <rect x="227" y="298" width="16" height="5"  rx="2" fill="#242018"/>
  <circle cx="235" cy="252" r="28" fill="url(#aChGold)" opacity="0.88"/>
  <circle cx="235" cy="252" r="23" fill="url(#aVanMir)"/>
  <circle cx="228" cy="244" r="6"  fill="#FFFFFF" opacity="0.10"/>

  <!-- BIZILUXE HAIR placard on vanity -->
  <rect x="244" y="232" width="148" height="52" fill="url(#aBkFace)"/>
  <rect x="244" y="225" width="148" height="9"  fill="url(#aBkTop)"/>
  <rect x="390" y="232" width="14"  height="52" fill="#0C0A08" opacity="0.90"/>
  <rect x="390" y="225" width="14"  height="9"  fill="#0A0808"/>
  <line x1="246" y1="248" x2="388" y2="248" stroke="#C9A96E" stroke-width="0.7" opacity="0.44"/>
  <line x1="246" y1="278" x2="388" y2="278" stroke="#C9A96E" stroke-width="0.7" opacity="0.44"/>
  <text x="317" y="266" font-family="'Cormorant Garamond',Georgia,serif" font-size="15" font-weight="300" fill="url(#aGoldT)" text-anchor="middle" letter-spacing="4" opacity="0.96">BIZILUXE</text>
  <text x="317" y="278" font-family="'Montserrat',sans-serif" font-size="7" font-weight="600" fill="#D4B87A" text-anchor="middle" letter-spacing="3.5" opacity="0.88">HAIR</text>

  <!-- ─── VIGNETTES (same as wholesale) ─── -->
  <rect x="-308" y="-124" width="508" height="829" fill="url(#vigL)"/>
  <rect x="1240" y="-124" width="509" height="829" fill="url(#vigR)"/>
  <rect x="-308" y="370"  width="2057" height="335" fill="url(#vigB)"/>
</svg>
