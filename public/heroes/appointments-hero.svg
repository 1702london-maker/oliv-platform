<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 580" preserveAspectRatio="xMidYMid slice" width="1440" height="580">
  <defs>
    <!-- Studio backdrop — same palette as all pages -->
    <linearGradient id="aBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#424040"/>
      <stop offset="28%"  stop-color="#555250"/>
      <stop offset="54%"  stop-color="#5E5A56"/>
      <stop offset="78%"  stop-color="#575350"/>
      <stop offset="100%" stop-color="#4A4744"/>
    </linearGradient>
    <linearGradient id="aTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C1810" stop-opacity="0.48"/>
      <stop offset="38%"  stop-color="#1C1810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#100C08" stop-opacity="0.42"/>
    </linearGradient>
    <radialGradient id="aKey" cx="65%" cy="14%" r="52%">
      <stop offset="0%"   stop-color="#807060" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5E5A56" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#363230"/>
      <stop offset="100%" stop-color="#242018"/>
    </linearGradient>

    <!-- Mirror surface & frame -->
    <linearGradient id="aMirrorSurface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6A6662" stop-opacity="0.72"/>
      <stop offset="40%"  stop-color="#7A7672" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#5A5652" stop-opacity="0.48"/>
    </linearGradient>
    <linearGradient id="aMirrorFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#A07818"/>
      <stop offset="25%"  stop-color="#D4B060"/>
      <stop offset="50%"  stop-color="#E8C870"/>
      <stop offset="75%"  stop-color="#C9A040"/>
      <stop offset="100%" stop-color="#9A7018"/>
    </linearGradient>
    <linearGradient id="aMirrorSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Small vanity mirror -->
    <radialGradient id="aVanMirror" cx="40%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#8A8682" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5A5652" stop-opacity="0.4"/>
    </radialGradient>

    <!-- Chair -->
    <linearGradient id="aChairL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#282420"/>
      <stop offset="30%"  stop-color="#1A1614"/>
      <stop offset="70%"  stop-color="#141210"/>
      <stop offset="100%" stop-color="#0E0C0A"/>
    </linearGradient>
    <linearGradient id="aChairM" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#484440"/>
      <stop offset="30%"  stop-color="#686460"/>
      <stop offset="60%"  stop-color="#888280"/>
      <stop offset="100%" stop-color="#383430"/>
    </linearGradient>
    <linearGradient id="aChairGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#A07818"/>
      <stop offset="40%"  stop-color="#C9A96E"/>
      <stop offset="70%"  stop-color="#D4B478"/>
      <stop offset="100%" stop-color="#9A7018"/>
    </linearGradient>

    <!-- Vanity table -->
    <linearGradient id="aVanity" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#201C18"/>
      <stop offset="100%" stop-color="#141210"/>
    </linearGradient>
    <linearGradient id="aVanityTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2E2A26"/>
      <stop offset="100%" stop-color="#201C18"/>
    </linearGradient>

    <!-- Gold brand text -->
    <linearGradient id="aGoldT" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#B8900A"/>
      <stop offset="50%"  stop-color="#E8C858"/>
      <stop offset="100%" stop-color="#C09828"/>
    </linearGradient>
    <linearGradient id="aBkFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#201C14"/>
      <stop offset="100%" stop-color="#121008"/>
    </linearGradient>
    <linearGradient id="aBkTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2C2418"/>
      <stop offset="100%" stop-color="#1C1810"/>
    </linearGradient>

    <!-- Overlays -->
    <linearGradient id="aTextOv" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#484440" stop-opacity="0.80"/>
      <stop offset="30%"  stop-color="#504C48" stop-opacity="0.50"/>
      <stop offset="62%"  stop-color="#5A5652" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#5A5652" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="aVig" cx="55%" cy="50%" r="70%">
      <stop offset="48%"  stop-color="#5E5A56" stop-opacity="0"/>
      <stop offset="100%" stop-color="#282420" stop-opacity="0.78"/>
    </radialGradient>

    <filter id="aSb"><feGaussianBlur stdDeviation="2.5"/></filter>
    <filter id="aMirBlur"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>

  <!-- ─── BACKDROP ─── -->
  <rect width="1440" height="580" fill="url(#aBg)"/>
  <rect width="1440" height="580" fill="url(#aTop)"/>
  <rect width="1440" height="580" fill="url(#aKey)"/>
  <!-- Floor -->
  <rect x="0" y="490" width="1440" height="90" fill="url(#aFloor)"/>
  <line x1="0" y1="490" x2="1440" y2="490" stroke="#1A1612" stroke-width="2" opacity="0.5"/>

  <!-- ─── LARGE SALON MIRROR (back wall, centre-right) ─── -->
  <!-- Mirror shadow on wall -->
  <rect x="594" y="-8" width="372" height="500" rx="12" fill="#1A1612" opacity="0.35" filter="url(#aSb)"/>
  <!-- Gold outer frame -->
  <rect x="600" y="-8" width="360" height="498" rx="10" fill="url(#aMirrorFrame)"/>
  <!-- Gold inner frame line -->
  <rect x="610" y="2"   width="340" height="478" rx="8" fill="#1A1612" opacity="0.5"/>
  <!-- Mirror surface -->
  <rect x="616" y="8"   width="328" height="466" rx="6" fill="url(#aMirrorSurface)"/>
  <!-- Mirror sheen (diagonal light catch) -->
  <rect x="616" y="8"   width="328" height="466" rx="6" fill="url(#aMirrorSheen)"/>
  <!-- Subtle reflection lines -->
  <path d="M 640 30 Q 760 60 840 30" stroke="#FFFFFF" stroke-width="0.6" fill="none" opacity="0.12"/>
  <path d="M 650 50 Q 740 75 820 48" stroke="#FFFFFF" stroke-width="0.4" fill="none" opacity="0.08"/>

  <!-- OLIVHAIRSUPPLY branding IN the mirror (top section) -->
  <!-- Mirror logo plate -->
  <rect x="650" y="28" width="260" height="60" rx="3" fill="#1A1612" opacity="0.72"/>
  <line x1="655" y1="48"  x2="905" y2="48"  stroke="#C9A96E" stroke-width="0.8" opacity="0.55"/>
  <line x1="655" y1="80"  x2="905" y2="80"  stroke="#C9A96E" stroke-width="0.8" opacity="0.55"/>
  <text x="780" y="60" font-family="'Cormorant Garamond',Georgia,serif" font-size="14" font-weight="300" fill="url(#aGoldT)" text-anchor="middle" letter-spacing="4" opacity="0.95">OLIVHAIRSUPPLY</text>
  <text x="780" y="74" font-family="'Cormorant Garamond',Georgia,serif" font-size="8" font-style="italic" fill="#D4B87A" text-anchor="middle" letter-spacing="3.5" opacity="0.85">Berlin · Premium Hair</text>

  <!-- Mirror gold corner ornaments -->
  <circle cx="620"  cy="12"  r="5" fill="url(#aChairGold)" opacity="0.9"/>
  <circle cx="940"  cy="12"  r="5" fill="url(#aChairGold)" opacity="0.9"/>
  <circle cx="620"  cy="470" r="5" fill="url(#aChairGold)" opacity="0.9"/>
  <circle cx="940"  cy="470" r="5" fill="url(#aChairGold)" opacity="0.9"/>
  <!-- Mid-frame ornaments -->
  <circle cx="600"  cy="248" r="4" fill="url(#aChairGold)" opacity="0.85"/>
  <circle cx="960"  cy="248" r="4" fill="url(#aChairGold)" opacity="0.85"/>

  <!-- ─── SALON CHAIR (centre, in front of mirror) ─── -->
  <ellipse cx="780" cy="496" rx="118" ry="10" fill="#060402" opacity="0.50" filter="url(#aSb)"/>
  <!-- Pedestal base -->
  <ellipse cx="780" cy="492" rx="88"  ry="8"  fill="#1A1614" opacity="0.90"/>
  <!-- Column -->
  <rect x="764" y="362" width="32" height="130" fill="url(#aChairM)"/>
  <rect x="768" y="362" width="8"  height="130" fill="#888280" opacity="0.28"/>
  <!-- Hydraulic pump -->
  <rect x="756" y="340" width="48" height="30" rx="5" fill="#282420"/>
  <rect x="759" y="342" width="42" height="26" rx="4" fill="#363230"/>
  <!-- Seat -->
  <rect x="700" y="300" width="160" height="56" rx="16" fill="url(#aChairL)"/>
  <rect x="702" y="302" width="156" height="18" rx="10" fill="#282420" opacity="0.55"/>
  <line x1="724" y1="317" x2="836" y2="317" stroke="#3A3430" stroke-width="0.8" opacity="0.42"/>
  <line x1="724" y1="336" x2="836" y2="336" stroke="#3A3430" stroke-width="0.8" opacity="0.35"/>
  <!-- Backrest -->
  <rect x="726" y="130" width="108" height="178" rx="20" fill="url(#aChairL)"/>
  <rect x="730" y="134" width="100" height="170" rx="16" fill="#1A1614"/>
  <line x1="745" y1="174" x2="820" y2="174" stroke="#2A2420" stroke-width="0.8" opacity="0.38"/>
  <line x1="745" y1="220" x2="820" y2="220" stroke="#2A2420" stroke-width="0.7" opacity="0.32"/>
  <line x1="745" y1="264" x2="820" y2="264" stroke="#2A2420" stroke-width="0.7" opacity="0.28"/>
  <!-- OHS monogram on backrest -->
  <text x="780" y="208" font-family="'Cormorant Garamond',Georgia,serif" font-size="13" font-style="italic" fill="#C9A96E" text-anchor="middle" letter-spacing="3" opacity="0.32">OHS</text>
  <!-- Gold footrest -->
  <rect x="688" y="422" width="184" height="8" rx="4" fill="url(#aChairGold)"/>
  <ellipse cx="693" cy="426" rx="5" ry="5" fill="#C9A96E" opacity="0.90"/>
  <ellipse cx="867" cy="426" rx="5" ry="5" fill="#C9A96E" opacity="0.90"/>
  <!-- Armrests -->
  <rect x="695" y="284" width="12" height="44" rx="4" fill="url(#aChairM)"/>
  <rect x="853" y="284" width="12" height="44" rx="4" fill="url(#aChairM)"/>
  <rect x="691" y="279" width="20" height="11" rx="3" fill="#1A1614"/>
  <rect x="849" y="279" width="20" height="11" rx="3" fill="#1A1614"/>

  <!-- Chair reflection in mirror (subtle) -->
  <rect x="736" y="300" width="90" height="170" rx="10" fill="#282420" opacity="0.18" filter="url(#aMirBlur)"/>

  <!-- ─── VANITY TABLE (shifted +138px right, touching mirror) ─── -->
  <ellipse cx="478" cy="426" rx="135" ry="10" fill="#060402" opacity="0.42" filter="url(#aSb)"/>
  <!-- Table legs -->
  <rect x="366" y="368" width="12" height="120" rx="4" fill="#1E1A16"/>
  <rect x="570" y="368" width="12" height="120" rx="4" fill="#1E1A16"/>
  <!-- Table surface -->
  <rect x="348" y="338" width="252" height="36" rx="6" fill="url(#aVanityTop)"/>
  <rect x="348" y="362" width="252" height="10" rx="2" fill="#1A1614" opacity="0.8"/>
  <line x1="348" y1="338" x2="600" y2="338" stroke="#C9A96E" stroke-width="1.2" opacity="0.45"/>

  <!-- Products on vanity -->
  <rect x="386" y="268" width="28" height="72" rx="6" fill="#1A1814"/>
  <rect x="388" y="270" width="24" height="68" rx="5" fill="#242018"/>
  <rect x="392" y="266" width="16" height="8"  rx="2" fill="#2A2420"/>
  <text x="400" y="306" font-family="'Montserrat',sans-serif" font-size="5.5" fill="#C9A96E" text-anchor="middle" letter-spacing="1.5" transform="rotate(-90,400,306)" opacity="0.72">BIZILUXE</text>
  <ellipse cx="442" cy="324" rx="20" ry="24" fill="#1E1C18"/>
  <ellipse cx="442" cy="318" rx="14" ry="10" fill="#2A2824"/>
  <rect x="437" y="308" width="10" height="10" rx="2" fill="#242018"/>
  <rect x="468" y="285" width="22" height="56" rx="5" fill="#201E1A"/>
  <rect x="470" y="287" width="18" height="52" rx="4" fill="#2C2A26"/>
  <rect x="473" y="283" width="12" height="6"  rx="2" fill="#242018"/>
  <!-- Comb -->
  <rect x="514" y="334" width="60" height="7"  rx="2" fill="#1A1814"/>
  <g stroke="#3A3630" stroke-width="1.2" opacity="0.6">
    <line x1="518" y1="334" x2="518" y2="326"/><line x1="523" y1="334" x2="523" y2="324"/>
    <line x1="528" y1="334" x2="528" y2="326"/><line x1="533" y1="334" x2="533" y2="324"/>
    <line x1="538" y1="334" x2="538" y2="326"/><line x1="543" y1="334" x2="543" y2="324"/>
    <line x1="548" y1="334" x2="548" y2="326"/><line x1="553" y1="334" x2="553" y2="324"/>
    <line x1="558" y1="334" x2="558" y2="326"/><line x1="563" y1="334" x2="563" y2="326"/>
  </g>

  <!-- Small vanity mirror -->
  <rect x="355" y="306" width="6" height="35" rx="3" fill="#2A2420"/>
  <rect x="350" y="338" width="16" height="5"  rx="2" fill="#242018"/>
  <circle cx="358" cy="292" r="30" fill="url(#aChairGold)" opacity="0.88"/>
  <circle cx="358" cy="292" r="25" fill="url(#aVanMirror)"/>
  <circle cx="351" cy="284" r="7"  fill="#FFFFFF" opacity="0.10"/>

  <!-- ─── BRAND PLACARD (smaller, shifted right, text: BIZILUXE HAIR) ─── -->
  <rect x="374" y="282" width="162" height="60"  fill="url(#aBkFace)"/>
  <rect x="374" y="275" width="162" height="9"   fill="url(#aBkTop)"/>
  <rect x="534" y="282" width="16"  height="60"  fill="#0C0A08" opacity="0.9"/>
  <rect x="534" y="275" width="16"  height="9"   fill="#0A0808"/>
  <line x1="376" y1="298" x2="532" y2="298" stroke="#C9A96E" stroke-width="0.7" opacity="0.44"/>
  <line x1="376" y1="335" x2="532" y2="335" stroke="#C9A96E" stroke-width="0.7" opacity="0.44"/>
  <text x="455" y="316" font-family="'Cormorant Garamond',Georgia,serif" font-size="16" font-weight="300" fill="url(#aGoldT)" text-anchor="middle" letter-spacing="4" opacity="0.96">BIZILUXE</text>
  <text x="455" y="330" font-family="'Montserrat',sans-serif" font-size="7.5" font-weight="600" fill="#D4B87A" text-anchor="middle" letter-spacing="3.5" opacity="0.88">HAIR</text>

  <!-- ─── OVERLAYS ─── -->
  <rect width="1440" height="580" fill="url(#aTextOv)"/>
  <rect width="1440" height="580" fill="url(#aVig)"/>
</svg>
