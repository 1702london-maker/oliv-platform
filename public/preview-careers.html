<!DOCTYPE html>
<html>
<head><style>
  body { margin: 0; background: #1a1a1a; }
  .hero {
    position: relative; width: 100vw; height: 580px;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .overlay { position: absolute; inset: 0; background: rgba(15,10,6,0.25); }
  .text { position: relative; z-index: 2; text-align: center; color: #fff; font-family: 'Cormorant Garamond', Georgia, serif; padding: 0 24px; }
  .eye { font-family: Montserrat, sans-serif; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: #B68A45; display: block; margin-bottom: 16px; }
  h1 { font-size: 62px; font-weight: 300; margin: 0 0 18px; }
  h1 em { font-style: italic; color: #C9A96E; }
  p { font-family: Montserrat, sans-serif; font-size: 15px; color: rgba(248,242,236,0.82); max-width: 560px; margin: 0 auto; }
  @media (max-width: 768px) {
    .hero {
      height: 84vh;
      background-image: url('/heroes/careers-hero-mobile.svg');
      background-size: cover;
      background-position: center;
    }
    .hero img { display: none; }
    h1 { font-size: 32px; }
    p { font-size: 13px; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="hero">
    <img src="/heroes/careers-hero.svg" alt="">
    <div class="overlay"></div>
    <div class="text">
      <span class="eye">Careers</span>
      <h1>Join the OlivHairSupply <em>Team</em></h1>
      <p>Be part of a growing luxury hair brand built on excellence, creativity and community.</p>
    </div>
  </div>
</body>
</html>
